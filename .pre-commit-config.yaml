# Pre-commit configuration for Vibe Center
# Maps CI checks from .github/workflows/ci.yml to local git hooks
#
# Installation:
#   pre-commit install
#   pre-commit install --hook-type pre-push  # Optional: run on push instead of commit
#
# Run manually:
#   pre-commit run --all-files
#
# Bypass (emergency only):
#   git commit --no-verify

repos:
  # ── Shell Checks ────────────────────────────────────────────────────────────
  # Use local shellcheck instead of Docker to work with worktree symlinks
  # Skip zsh scripts (shellcheck doesn't support zsh)
  - repo: local
    hooks:
      - id: shellcheck
        name: ShellCheck (bash/sh scripts only)
        entry: bash -c 'for file in "$@"; do shebang=$(head -1 "$file"); if echo "$shebang" | grep -qE "bash|/sh"; then echo "Checking $file"; shellcheck -e SC1090,SC1091,SC1071,SC2038,SC2044,SC2012,SC2126,SC2155 -x "$file" || true; fi; done' --
        language: system
        files: \.(sh|bash)$
        pass_filenames: true

      - id: lint-sh
        name: Custom Lint (scripts/hooks/lint.sh)
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)" && bash scripts/hooks/lint.sh' --
        language: system
        pass_filenames: false

  # ── Python Checks ───────────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        name: Ruff (Python linter)
        files: ^(src|tests)/.*\.py$
        args: ['--fix']

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.3.1
    hooks:
      - id: black
        name: Black (Python formatter)
        files: ^(src|tests)/.*\.py$

  - repo: local
    hooks:
      - id: mypy
        name: MyPy (Python type checker)
        entry: uv run mypy src
        language: system
        files: ^src/.*\.py$
        pass_filenames: false
        types: [python]

  # ── LOC Checks (prevent code bloat) ─────────────────────────────────────────
  # MOVED TO PRE-PUSH: These checks are now warnings only and run before push
  # to allow incremental refactoring without blocking commits.
  #
  # See pre-push hooks below for LOC checks.
  #
  # Rationale:
  #   - Code size is an architectural concern, not a commit blocker
  #   - Allows draft PRs and incremental improvements
  #   - Warnings remind developers to refactor without blocking workflow

  # ── Pre-push Checks (run on push, not commit) ────────────────────────────────
  - repo: local
    hooks:
      - id: check-shell-loc
        name: Check Shell LOC ceiling (lib/ + bin/ + lib3/ ≤ 7000)
        entry: scripts/hooks/check-shell-loc.sh
        language: script
        pass_filenames: false
        files: \.(sh|bash)$
        stages: [pre-push]

      - id: check-python-loc
        name: Check Python LOC ceiling (src ≤ config:code_limits.v3_python.total_loc)
        entry: scripts/hooks/check-python-loc.sh
        language: script
        pass_filenames: false
        files: ^src/.*\.py$
        stages: [pre-push]

      - id: check-per-file-loc
        name: "Check source file LOC (default: 200, max: 300)"
        entry: scripts/hooks/check-per-file-loc.sh
        language: script
        pass_filenames: false
        stages: [pre-push]

      - id: check-test-file-loc
        name: "Check test file LOC (default: 200, max: 300)"
        entry: scripts/hooks/check-test-file-loc.sh
        language: script
        pass_filenames: false
        files: ^tests/vibe3/.*\.py$
        stages: [pre-push]

      - id: pre-push-checks
        name: Pre-push checks (coverage + risk-based review)
        entry: scripts/hooks/pre-push.sh
        language: script
        pass_filenames: false
        stages: [pre-push]
        verbose: true

  # ── Test Checks ───────────────────────────────────────────────────────────
  # Tests run in pre-push, not pre-commit (faster local iteration)
  #
  # Rationale:
  #   - Pre-commit: fast feedback (<10s), only lint/format/type
  #   - Pre-push: full test suite (~1-2min), protects remote
  #   - CI: comprehensive testing + coverage
  #
  # Uncomment below if you want tests in pre-commit (slower commits):
  #
  # - repo: local
  #   hooks:
  #     - id: pytest
  #       name: Pytest (Python tests)
  #       entry: uv run pytest tests/vibe3 -v
  #       language: system
  #       pass_filenames: false
  #       files: ^(src|tests/vibe3)/.*\.py$
  #
  #     - id: bats
  #       name: Bats (Shell tests)
  #       entry: bats tests/
  #       language: system
  #       pass_filenames: false
  #       files: ^tests/.*\.(bats|sh)$

# ── Configuration ─────────────────────────────────────────────────────────────
# Use system default Python (avoid pre-commit trying to install python3.10)
# The project uses uv for dependency management with Python 3.12

fail_fast: false
minimum_pre_commit_version: '3.0.0'
