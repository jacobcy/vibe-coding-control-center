# Event routing rules for orchestration
#
# Rules are evaluated for every published domain event.
# Each rule specifies:
#   - event: DomainEvent class name to match
#   - action: Action identifier (e.g., "log", "enqueue_command_job", "refresh_queue_priority")
#   - params: Template parameters with {{ event.field }} syntax
#   - enabled: Whether the rule is active (default: true)
#
# Template expansion:
#   - {{ event.field }} is replaced with the event's attribute value
#   - Unknown fields are replaced with empty string
#
# This file is loaded at server startup via EventPublisher.on_publish hook.

rules:
  # P0: Issue failed → auto-dispatch manager for recovery
  - event: IssueFailed
    action: enqueue_command_job
    params:
      command_type: "manager"
      issue_number: "{{ event.issue_number }}"
      actor: "{{ event.actor }}"

  # P0: Issue failed → refresh queue priority
  - event: IssueFailed
    action: refresh_queue_priority
    params:
      issue: "{{ event.issue_number }}"
      actor: "event:issue_failed"

  # P1: Governance scan started → log for observability
  - event: GovernanceScanStarted
    action: log
    params:
      message: "governance scan started (tick={{ event.tick_count }})"

  # P1: Governance scan completed → reload materials
  - event: GovernanceScanCompleted
    action: reload_material
    scope: [governance, prompts]

  # P0: Webhook label changed → refresh frozen queue priority
  - event: WebhookLabelChanged
    action: refresh_queue_priority
    params:
      issue: "{{ event.issue_number }}"
      actor: "event:label_changed"

  # P1: Webhook label changed → log for observability
  - event: WebhookLabelChanged
    action: log
    params:
      message: "webhook label changed: issue #{{ event.issue_number }} label={{ event.label }} action={{ event.action }}"

  # P0: Webhook issue updated → refresh frozen queue priority
  - event: WebhookIssueUpdated
    action: refresh_queue_priority
    params:
      issue: "{{ event.issue_number }}"
      actor: "event:issue_updated"

  # P1: Webhook issue updated → log for observability
  - event: WebhookIssueUpdated
    action: log
    params:
      message: "webhook issue updated: issue #{{ event.issue_number }} action={{ event.action }}"

  # Webhook: PR merged → log (upstream handler can trigger flow advancement)
  - event: WebhookPRMerged
    action: log
    params:
      message: "webhook PR merged: pr #{{ event.pr_number }}"

  # Webhook: PR reviewed → log
  - event: WebhookPRReviewed
    action: log
    params:
      message: "webhook PR reviewed: pr #{{ event.pr_number }} state={{ event.state }}"

  # Webhook: issue closed → log
  - event: WebhookIssueClosed
    action: log
    params:
      message: "webhook issue closed: issue #{{ event.issue_number }}"

  # Flow blocked → log for downstream tracking
  - event: FlowBlocked
    action: log
    params:
      message: "flow blocked for issue #{{ event.issue_number }}: {{ event.blocked_reason }}"

  # Flow completed → log for downstream tracking
  - event: FlowCompleted
    action: log
    params:
      message: "flow completed for issue #{{ event.issue_number }} ({{ event.completed_state }})"

  # PR merged → log for downstream tracking
  - event: PRMerged
    action: log
    params:
      message: "PR merged for issue #{{ event.issue_number }} (pr #{{ event.pr_number }})"

  # Policy changed → log for observability
  - event: PolicyChanged
    action: log
    params:
      message: "policy files changed: {{ event.changed_files }}"
