# Vibe Center LOC 限制配置
# 定义文档和代码的行数限制及例外清单

# 文本量控制
doc_limits:
  single_file_loc:
    warning_threshold: 500    # 超标触发 WARNING（建议重构）
    ci_block_threshold: 800   # 超标触发 CI ERROR（阻塞 pipeline）

# 代码量控制
code_limits:
  single_file_loc:
    warning_threshold: 300    # 超标触发 WARNING（建议重构）
    ci_block_threshold: 400   # 超标触发 CI ERROR（阻塞 pipeline）

    # 例外清单：核心聚合文件、兼容入口、强耦合测试允许适度超标
    # 原则：LOC 上限是治理触发器而非硬性阻塞，命中时触发质量回收审计
    exceptions:
      # 核心业务聚合 —— 允许 600-700
      - path: "src/vibe3/domain/dispatch_coordinator.py"
        limit: 700
        reason: "Global dispatch coordinator (migrated from orchestra to domain layer for domain-first architecture #1624)，核心调度聚合，包含 frozen queue 管理、dispatch 协调、issue 状态管理、健康检查、重启恢复等紧密耦合逻辑；mixin-to-service 重构后增加委托调用，整体代码量减少（删除 mixin 250 行，新增 service 149 行）"
      - path: "src/vibe3/services/pr_service.py"
        limit: 600
        reason: "PR 生命周期聚合"
      - path: "src/vibe3/services/check_service.py"
        limit: 680
        reason: "校验聚合服务，核心校验链路不适合再细碎拆分，包含 PR 状态处理、分支清理、flow 状态标记、PR closed 阻塞逻辑等紧密耦合逻辑"

      # Exceptions 聚合 —— 允许 480-590
      - path: "src/vibe3/domain/qualify_gate.py"
        limit: 560
        reason: "Qualify gate 域服务，包含 truth-first 决策流程、blocked 对齐、auto-resume、worktree 健康检查、依赖检查、github_state CLOSED guard 等紧密耦合逻辑；PR #1983 重构后新增统一 closed issue 检测（_terminalize_closed_issue 方法），将 HealthCheck 的业务逻辑迁移到 QualifyGate，实现单一职责（business qualification）"
      - path: "src/vibe3/services/handoff_service.py"
        limit: 650
        reason: "Handoff 记录管理核心服务，内聚度高，模板函数共生；包含 terminology 统一映射逻辑；--branch 参数统一支持后略微膨胀；新增 blocked_reason 自动清除逻辑（当 plan_ref/report_ref 写入时）；新增 event 驱动架构支持（FlowTimelineService 集成，issue_number 查询，event 记录逻辑）"

      # Clients 聚合 —— 允许 450-540
      - path: "src/vibe3/clients/sqlite_schema.py"
        limit: 540
        reason: "Schema DDL 与迁移聚合，包含 9 个表定义（含 transition_history）、16+ 迁移步骤（含幂等历史数据提取），新增 severity 列迁移与回填逻辑，DDL 字符串和迁移逻辑紧密耦合不宜拆分"
      - path: "src/vibe3/clients/git_client.py"
        limit: 540
        reason: "Git 门面聚合，新增 get_all_branches_with_timestamps 支持过期资源清理，新增 find_repo_root() 统一 repo 根目录解析（带 lru_cache 缓存优化）"
      - path: "src/vibe3/clients/github_pr_read_ops.py"
        limit: 520
        reason: "GitHub PR 只读查询聚合，新增 CI 失败分类与检查步骤解析逻辑，包含失败分类、日志解析、状态映射等紧密耦合逻辑"
      - path: "src/vibe3/clients/sqlite_flow_state_repo.py"
        limit: 460
        reason: |
          Repo 层职责内聚，包含：
          - 基础 CRUD 操作（10 个 get 方法）
          - Soft-delete 扩展（4 个方法）
          - Cascade delete 逻辑
          - Query 过滤逻辑（WHERE deleted_at IS NULL）
          - get_task_issue_number 方法（从 flow_issue_links 查询 task issue）
          - UTC-aware datetime 写入（update_flow_state, add_issue_link）

          拆分会破坏：
          - 数据访问层完整性
          - 查询一致性（所有方法都需过滤 deleted_at）
          - 事务原子性保证

      # Commands 层 —— 允许 480-550
      - path: "src/vibe3/commands/status.py"
        limit: 450
        reason: "Status 命令聚合，包含 Orchestra/Configuration/Flows/Tasks 多维度显示，新增 Vibe3 Configuration section（repo name, manager agents, polling interval 等）后略微超标"
      - path: "src/vibe3/commands/task.py"
        limit: 500
        reason: "Task 命令聚合，包含 show/status/intake/resume 多个子命令入口；新增 vibe3 task intake 命令（issue assignee 分配 + guard 逻辑）后超标"
      - path: "src/vibe3/commands/pr_query.py"
        limit: 560
        reason: "PR query 命令聚合，包含 PR 详情展示、inspect 生成、trace 输出、branch → PR 推导逻辑、外部事件记录优化（resolved_branch 计算一次重用）、统一 issue number 解析（IssueFlowService.resolve_task_issue_number 集成）等紧密耦合功能"
      - path: "src/vibe3/commands/flow_manage.py"
        limit: 500
        reason: "Flow management 命令聚合，包含 update/bind/list-deleted/restore 四个完整命令，JsonOption→FormatOption 迁移增加必要的 deprecation handling blocks，新增 issue number 自动创建 branch + flow 逻辑，新增 --min-ms trace 参数支持"
      - path: "src/vibe3/commands/plan.py"
        limit: 450
        reason: "Plan 命令聚合，包含 spec 解析、sync/async dispatch、CLI 参数处理；新增 --agent/--backend/--model/--fresh-session 参数以匹配 run 命令接口，支持配置覆盖与会话管理后略微超标"

      # Services 层 —— 允许 410-540
      - path: "src/vibe3/services/handoff_resolution.py"
        limit: 650
        reason: "Handoff target resolution service, 包含 @vibe/ 命名空间解析（三层 fallback：显式参数 → repo 自动检测 → 全局 ~/.vibe）、路径验证与安全检查（正则校验 + 路径遍历防护 + 边界检查）、四个命名空间统一解析逻辑（@key/@vibe/relative/absolute）等紧密耦合功能；新增 @vibe/ 命名空间支持后从 371 行增至 544 行（+173 行核心代码）"
      - path: "src/vibe3/analysis/snapshot_service.py"
        limit: 480
        reason: "Snapshot 服务聚合，包含 build/save/load/list、branch baseline 管理、结构分析等紧密耦合逻辑"
      - path: "src/vibe3/services/status_query_service.py"
        limit: 480
        reason: "Status 查询服务，聚合 orchestra/flow/task 多维度查询逻辑"
      - path: "src/vibe3/services/task_service.py"
        limit: 480
        reason: "Task 服务聚合，包含状态转换、查询、resume 候选筛选逻辑"
      - path: "src/vibe3/services/task_show_service.py"
        limit: 410
        reason: "Task show 服务聚合，包含 task detail 查询、issue comment 处理、PR summary 构建、ref 选择逻辑（state machine）、resolve_branch 统一入口（支持 --pr 选项）等紧密耦合逻辑"
      - path: "src/vibe3/services/expired_resource_cleanup_service.py"
        limit: 650
        reason: "过期资源清理服务聚合，包含 agent worktree、远程分支、本地分支清理等三个紧密耦合的过期资源清理逻辑；新增 quiet 模式、颜色高亮输出，以及 flow-record 安全闸（active/blocked 分支保护 + _get_active_flow_branches，替代 merge 状态作为删除依据，issue #2033）后略微超标"
      - path: "src/vibe3/services/flow_cleanup_service.py"
        limit: 420
        reason: "Flow 现场清理服务，包含 worktree/branch/handoff/flow record 等多步清理编排、live session 终端处理、prune worktree 兜底逻辑等紧密耦合的清理步骤"
      - path: "src/vibe3/services/check_cleanup_service.py"
        limit: 590
        reason: "终端 flow 清理 + detached worktree 清理聚合，包含 done/aborted 处理、live session 过滤、issue resume、detached worktree 安全清理（worktree root 比较、flow-managed scope 检查）等紧密耦合逻辑；Task #9 重构后新增 TaskResumeOperations 集成，略微超标"

      # Roles 层 —— 允许 480-600
      - path: "src/vibe3/roles/governance.py"
        limit: 450
        reason: "Core governance aggregation file with tightly coupled responsibilities (material rotation via execution_count, snapshot context building, prompt rendering, request building) - splitting would harm cohesion and readability"
      - path: "src/vibe3/roles/manager.py"
        limit: 480
        reason: "Manager 角色聚合，包含 request builder、sync request 构建、dry_run_summary 生成（variant 解析、session 管理、sections 提取）等紧密耦合逻辑；新增 dry_run_summary 支持后略微超标（#2038）"
      - path: "src/vibe3/roles/review.py"
        limit: 600
        reason: "Reviewer 角色聚合，包含 request builder、sync/async dispatch、parser 集成"
      - path: "src/vibe3/roles/plan.py"
        limit: 480
        reason: "Planner 角色聚合，包含 request builder、sync/async dispatch、spec 解析（支持 issue number 和 file path 双通道）、resolve_spec_plan_input 等紧密耦合逻辑"

      # Server —— 允许 450-520
      - path: "src/vibe3/server/app.py"
        limit: 520
        reason: "Orchestra CLI 入口聚合，职责单一（包含 FailedGate/ErrorTracking status 显示、密钥加载 fallback 检查、全局单例实例管理、OrchestraInstanceInfo 集成、serve start/stop/status 增强、manager username 显示）"
      - path: "src/vibe3/server/registry.py"
        limit: 450
        reason: "Orchestra 服务注册与启动聚合，包含 serve 命令构建、async child process 启动、debug 模式代码根覆盖、环境变量传递等紧密耦合的启动逻辑"

