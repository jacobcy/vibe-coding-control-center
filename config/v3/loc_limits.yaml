      - path: "scripts/install.sh"
        limit: 500
        reason: "全局安装脚本聚合，包含目录同步、supervisor/ 同步、过期文件清理、settings.yaml 迁移、sanity check 等完整安装生命周期；PR #1993 新增 canonical path 迁移和 sanity check 后超标"
