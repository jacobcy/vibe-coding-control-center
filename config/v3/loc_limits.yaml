# Vibe Center LOC 限制配置
# 定义文档和代码的行数限制及例外清单

# 文本量控制
doc_limits:
  single_file_loc:
    warning_threshold: 500    # 超标触发 WARNING（建议重构）
    ci_block_threshold: 800   # 超标触发 CI ERROR（阻塞 pipeline）

# 代码量控制
code_limits:
  single_file_loc:
    warning_threshold: 300    # 超标触发 WARNING（建议重构）
    ci_block_threshold: 400   # 超标触发 CI ERROR（阻塞 pipeline）

    # 例外清单：核心聚合文件、兼容入口、强耦合测试允许适度超标
    # 原则：LOC 上限是治理触发器而非硬性阻塞，命中时触发质量回收审计
    exceptions:
      # 核心业务聚合 —— 允许 600
      - path: "src/vibe3/orchestra/global_dispatch_coordinator.py"
        limit: 600
        reason: "Frozen queue dispatch coordinator，核心调度聚合，包含 frozen queue 管理、dispatch 协调、issue 状态管理、健康检查、重启恢复等紧密耦合逻辑"
      - path: "src/vibe3/services/flow_service.py"
        limit: 600
        reason: "核心状态机聚合，吸收 flow_query_mixin"
      - path: "src/vibe3/services/pr_service.py"
        limit: 600
        reason: "PR 生命周期聚合"
      - path: "src/vibe3/services/check_service.py"
        limit: 620
        reason: "校验聚合服务，核心校验链路不适合再细碎拆分，包含 PR 状态处理、分支清理、flow 状态标记等紧密耦合逻辑"
      - path: "src/vibe3/services/issue_failure_service.py"
        limit: 600
        reason: "Issue 状态异常转换聚合，职责单一 (fail/block/resume/confirm)，辅助函数共享，与测试对称"
      - path: "src/vibe3/services/task_resume_operations.py"
        limit: 470
        reason: "Task resume 操作聚合，包含 reset、label resume 等内聚操作；_clear_blocked_projection 改进后增加显式字段清除逻辑"
      - path: "src/vibe3/domain/qualify_gate.py"
        limit: 450
        reason: "Qualify gate 域服务，包含 truth-first 决策流程、blocked 对齐、auto-resume、worktree 健康检查、依赖检查等紧密耦合逻辑"
      - path: "src/vibe3/services/handoff_service.py"
        limit: 580
        reason: "Handoff 记录管理核心服务，内聚度高，模板函数共生；包含 terminology 统一映射逻辑；--branch 参数统一支持后略微膨胀"

      # Clients 聚合 —— 允许 500
      - path: "src/vibe3/clients/sqlite_schema.py"
        limit: 500
        reason: "Schema DDL 与迁移聚合，包含 9 个表定义（含 transition_history）、16+ 迁移步骤（含幂等历史数据提取），DDL 字符串和迁移逻辑紧密耦合不宜拆分"
      - path: "src/vibe3/clients/git_client.py"
        limit: 520
        reason: "Git 门面聚合，新增 get_all_branches_with_timestamps 支持过期资源清理"
      - path: "src/vibe3/clients/github_pr_ops.py"
        limit: 530
        reason: "GitHub PR 操作与查询聚合（日志和错误处理对生产环境必要）"
      - path: "src/vibe3/clients/sqlite_client.py"
        limit: 650
        reason: "持久化聚合（flow_state/events/runtime_session 统一入口）"
      - path: "src/vibe3/clients/sqlite_flow_state_repo.py"
        limit: 420
        reason: |
          Repo 层职责内聚，包含：
          - 基础 CRUD 操作（10 个 get 方法）
          - Soft-delete 扩展（4 个方法）
          - Cascade delete 逻辑
          - Query 过滤逻辑（WHERE deleted_at IS NULL）

          拆分会破坏：
          - 数据访问层完整性
          - 查询一致性（所有方法都需过滤 deleted_at）
          - 事务原子性保证

      # Commands 层 —— 允许 440-650
      - path: "src/vibe3/commands/task.py"
        limit: 480
        reason: "Task 命令聚合，包含 resume、list、多个子命令入口"
      - path: "src/vibe3/commands/status.py"
        limit: 550
        reason: "Status 命令聚合，包含 flow/session/orchestra 多维度状态展示，6个渲染section紧密耦合，blocked_reason智能提取逻辑增加可读性，CLI 入口函数难以拆分"
      - path: "src/vibe3/commands/scan.py"
        limit: 470
        reason: "Scan 命令聚合（governance/supervisor/all 三个完整命令），每个命令包含执行入口和 dry-run 入口，已下沉 UI 和业务逻辑到 ui/ 和 services/ 层"
      - path: "src/vibe3/commands/pr_query.py"
        limit: 550
        reason: "PR query 命令聚合，包含 PR 详情展示、inspect 生成、trace 输出、branch → PR 推导逻辑、外部事件记录优化（resolved_branch 计算一次重用）等紧密耦合功能"
      - path: "src/vibe3/commands/flow_manage.py"
        limit: 450
        reason: "Flow management 命令聚合，包含 update/bind/list-deleted/restore 四个完整命令，JsonOption→FormatOption 迁移增加必要的 deprecation handling blocks"

      # Services 层 —— 允许 400-500
      - path: "src/vibe3/analysis/snapshot_service.py"
        limit: 450
        reason: "Snapshot 服务聚合，包含 build/save/load/list、branch baseline 管理、结构分析等紧密耦合逻辑"
      - path: "src/vibe3/services/status_query_service.py"
        limit: 450
        reason: "Status 查询服务，聚合 orchestra/flow/task 多维度查询逻辑"
      - path: "src/vibe3/services/task_service.py"
        limit: 450
        reason: "Task 服务聚合，包含状态转换、查询、resume 候选筛选逻辑"
      - path: "src/vibe3/services/task_show_service.py"
        limit: 410
        reason: "Task show 服务聚合，包含 task detail 查询、issue comment 处理、PR summary 构建、ref 选择逻辑（state machine）、resolve_branch 统一入口（支持 --pr 选项）等紧密耦合逻辑"
      - path: "src/vibe3/services/expired_resource_cleanup_service.py"
        limit: 540
        reason: "过期资源清理服务聚合，包含 agent worktree、远程分支、本地分支清理等三个紧密耦合的过期资源清理逻辑，新增 quiet 模式和颜色高亮输出后略微超标"
      - path: "src/vibe3/services/check_cleanup_service.py"
        limit: 540
        reason: "终端 flow 清理 + detached worktree 清理聚合，包含 done/aborted 处理、live session 过滤、issue resume、detached worktree 安全清理（worktree root 比较、flow-managed scope 检查）等紧密耦合逻辑"

      # Roles 层 —— 允许 350-600
      - path: "src/vibe3/roles/review.py"
        limit: 600
        reason: "Reviewer 角色聚合，包含 request builder、sync/async dispatch、parser 集成"
      - path: "src/vibe3/roles/run.py"
        limit: 600
        reason: "Executor 角色聚合，包含 request builder、sync/async dispatch、manual run 入口"
      - path: "src/vibe3/roles/manager.py"
        limit: 420
        reason: "Manager 角色聚合，包含 flow 状态机、dispatch 协调、issue 管理"
      - path: "src/vibe3/roles/governance.py"
        limit: 600
        reason: "Governance 角色聚合，包含 supervisor 材料组装、issue 扫描、dispatch 逻辑、vibe-task 过滤、材料目录加载、recipe 构建、prompt 渲染、issue context 快照等紧密耦合流程难以拆分"
      - path: "src/vibe3/roles/plan.py"
        limit: 410
        reason: "Planner 角色聚合，包含 request builder、sync/async dispatch、spec 解析（支持 issue number 和 file path 双通道）、resolve_spec_plan_input 等紧密耦合逻辑"

      # Server —— 允许 420-485
      - path: "src/vibe3/server/mcp.py"
        limit: 420
        reason: "MCP server 聚合，包含 3 resources + 4 tools + 输入验证 + 输出脱敏，职责单一但 tool 注册密度高"
      - path: "src/vibe3/server/app.py"
        limit: 485
        reason: "Orchestra CLI 入口聚合，职责单一（包含 FailedGate/ErrorTracking status 显示、密钥加载 fallback 检查）"
      - path: "src/vibe3/server/registry.py"
        limit: 420
        reason: "Orchestra PID/tmux 管理，多进程协调辅助函数共生"

      # Shell / 脚本兼容入口
      - path: "lib/alias/worktree.sh"
        limit: 500
        reason: "Shell worktree 入口聚合别名与辅助函数，维持单文件更符合使用方式"
      - path: "lib/keys_support.sh"
        limit: 500
        reason: "Keys 工具函数集合（trim、plugin scope hint 等），职责单一但函数较多"
      - path: "lib/init.sh"
        limit: 500
        reason: "项目初始化入口聚合，包含 profile 初始化、目录创建、GitHub labels 创建、CLAUDE.md 模板生成等紧密耦合逻辑，内嵌模板文本膨胀导致超标"
      - path: "scripts/tsu.sh"
        limit: 900
        reason: "外部集成脚本，保持独立发布形态，不按常规模块拆分"

      # 配置系统核心模块
      - path: "src/vibe3/config/settings.py"
        limit: 520
        reason: "核心配置模型聚合，包含 20+ Pydantic 模型定义、supplementary loading（loc_limits + prompts）、变量展开、CheckCleanupSettings 新增配置等配置加载逻辑，拆分会破坏配置系统完整性"

      # 基础设施核心模块
      - path: "src/vibe3/environment/worktree.py"
        limit: 600
        reason: "Worktree lifecycle management"
      - path: "src/vibe3/environment/worktree_lifecycle.py"
        limit: 500
        reason: "Worktree creation, validation, and find-or-create core logic extracted from worktree.py for size management; contains creation methods, validation helpers, recorded path lookup, and unified worktree resolution logic"
      - path: "src/vibe3/environment/session_registry.py"
        limit: 520
        reason: "Session 生命周期聚合，包含状态对账、容量统计、活跃检查、批量查询优化（get_all_branches_with_live_sessions 性能优化避免重复查询）等紧密耦合逻辑"
      - path: "src/vibe3/execution/coordinator.py"
        limit: 450
        reason: "执行协调器聚合，包含容量控制、执行生命周期、worktree 解析错误捕获、dispatch_execution 核心流程等紧密耦合逻辑"
      - path: "src/vibe3/execution/noop_gate.py"
        limit: 450
        reason: "No-op gate 聚合，包含单步转换限制检查（transition_history pair count）、全局转换计数检查、state 验证、ref 检查、GitHub API 错误处理等多层防御机制，职责单一但紧密耦合"
      - path: "src/vibe3/execution/codeagent_runner.py"
        limit: 450
        reason: "Sync execution runner 聚合，包含 supervisor label cleanup、context preparation、finalize 等紧密耦合的执行生命周期逻辑"
      - path: "src/vibe3/agents/backends/codeagent.py"
        limit: 610
        reason: "Codeagent execution backend（命令构建/tmux/同步异步执行紧密耦合）"
      - path: "src/vibe3/agents/backends/async_launcher.py"
        limit: 470
        reason: "Async launcher 工具类，包含 tmux 会话管理、日志路径分配、Codex 噪声过滤、wrapper 脚本启动四个高内聚模块"
      - path: "src/vibe3/services/orchestra_status_service.py"
        limit: 520
        reason: "Orchestra 状态查询服务，包含状态快照和格式化逻辑、IssueState 反序列化类型安全处理、HTTP fetch 集成、live snapshot 解析、pr_number 类型强制转换防御逻辑等紧密耦合逻辑，职责单一但方法较多"

      # Utils 层 —— 允许 550
      - path: "src/vibe3/utils/path_helpers.py"
        limit: 560
        reason: "路径解析核心工具与安全验证聚合：包含路径解析、handoff 路径处理、分支名安全验证（regex校验+路径边界检查）的三层防御机制。安全函数紧密耦合，拆分会降低代码可审计性和维护性。"

      # 强耦合测试例外
      - path: "tests/vibe3/agents/test_codeagent_backend.py"
        limit: 600
        reason: "Codeagent backend 核心测试，覆盖 sync/async 执行、tmux 管理、命令构建等紧密耦合逻辑"
      - path: "tests/vibe3/agents/test_codeagent_async.py"
        limit: 500
        reason: "Codeagent async 执行测试集，覆盖异步启动、日志收集、错误处理等场景，共享 fixture"
      - path: "tests/vibe3/agents/test_codeagent_config.py"
        limit: 500
        reason: "Codeagent config 测试集，覆盖 preset 解析、fallback、migration 场景，逻辑清晰且符合测试最佳实践"
      - path: "tests/vibe3/execution/test_execution_lifecycle.py"
        limit: 550
        reason: "Execution lifecycle 测试集，5 个测试类围绕同一服务契约，共享 fixture"
      - path: "tests/vibe3/execution/test_coordinator.py"
        limit: 600
        reason: "Coordinator 核心测试，12 个测试函数围绕调度逻辑（async/sync dispatch、capacity、error handling），共享 mock_dependencies fixture，拆分收益低"
      - path: "tests/vibe3/environment/test_worktree_branch_from_pr.py"
        limit: 450
        reason: "Worktree branch-from-PR 测试，多场景覆盖 pre-existing branch、PR base、状态标签等，共享 fixture"
      - path: "tests/vibe3/roles/test_governance.py"
        limit: 500
        reason: "Governance 角色测试集，覆盖 supervisor 材料组装、issue 扫描、dispatch 逻辑等多个紧密耦合场景"
      - path: "tests/vibe3/roles/test_manager.py"
        limit: 500
        reason: "Manager 角色测试集，覆盖 dispatch blocking、prompt assembly、state transition、failure handling 四个紧密耦合场景，拆分收益低"
      - path: "tests/vibe3/roles/test_review.py"
        limit: 450
        reason: "Review 角色测试集，覆盖 request builder、sync/async dispatch、parser 集成等紧密耦合逻辑"
      - path: "tests/vibe3/execution/test_codeagent_runner_gate.py"
        limit: 480
        reason: "Gate 集成测试，包含完整的 mock 设置和断言场景，拆分会破坏测试逻辑完整性"
      - path: "tests/vibe3/execution/test_noop_gate_unit.py"
        limit: 450
        reason: "Noop gate 三分支语义测试，15 个测试围绕同一 gate 函数，共享 mock fixture，拆分收益低"
      - path: "tests/vibe3/execution/test_noop_gate_transition_count.py"
        limit: 450
        reason: "Transition count 测试集，14 个测试围绕 transition_count 功能（全局计数、pair 追踪、事件记录），共享 fixture，拆分收益低"
      - path: "tests/vibe3/services/test_task_resume_operations.py"
        limit: 410
        reason: "Task resume 操作测试集，覆盖 reset、label resume 等所有场景，共享 fixture，拆分收益低"
      - path: "tests/vibe3/clients/test_github_client_prs.py"
        limit: 450
        reason: "GitHub client PR 测试集，覆盖 auth check、PR create/update、review operations 等多个场景，新增 GH_TOKEN 认证测试后略微超标"
      - path: "tests/vibe3/orchestra/test_dispatch_health_checks.py"
        limit: 460
        reason: "Health check failure 测试集，7 个独立测试用例验证 coordinator 对 CheckService 结果的处理逻辑，每个测试需要完整 mock setup，拆分会降低可读性"
      - path: "tests/vibe3/orchestra/test_dispatch_state_transitions.py"
        limit: 450
        reason: "Dispatch state transition 测试集，覆盖 promote、dispatch loop、recollection 等状态转换场景，每个测试需要完整 mock setup 和多步断言"
      - path: "tests/vibe3/orchestra/test_dispatch_queue_operations.py"
        limit: 450
        reason: "Dispatch queue operation 测试集，覆盖 merge、persist、restore、eviction 等 queue 操作场景，共享 fixture，拆分收益低"
      - path: "tests/vibe3/orchestra/test_dispatch_actionable_trigger.py"
        limit: 460
        reason: "Actionable trigger + dispatch pause 测试集 (#1206)，覆盖 collect/merge/dispatch loop 的 actionable 判断、dispatch_paused 状态管理、blocked-only rebuild 逻辑，共享 fixture，拆分收益低"
      - path: "tests/vibe3/commands/test_scan.py"
        limit: 410
        reason: "Scan 命令测试集，覆盖 governance/supervisor/all 三个完整命令的 dry-run 和实际执行场景，每个测试需要完整的 mock 设置和验证逻辑，拆分收益低"
      - path: "tests/vibe3/domain/test_qualify_gate_remote.py"
        limit: 610
        reason: "Qualify gate remote-first + E2E blocked reconciliation 测试集，覆盖 blocked_reason、dependencies、blocked_by_issue 的 remote/local 分支、blocked state change via service layer (#1206)，包含 #994 类 E2E 回归场景，测试类结构清晰，拆分收益低"
      - path: "tests/vibe3/domain/test_qualify_gate.py"
        limit: 480
        reason: "Qualify gate truth-first 决策流程测试集，覆盖 manual block、dependency block、auto-resume、stale state alignment、blocked state change via service layer (#1206) 等场景，共享 fixture，拆分收益低"
      - path: "tests/vibe3/utils/test_path_helpers.py"
        limit: 420
        reason: "Path helpers 测试集，覆盖 handoff 解析、路径遍历防护、分支名安全验证等紧密耦合逻辑，5 个新增测试扩展安全覆盖"
      - path: "tests/vibe3/services/test_flow_orchestrator_service.py"
        limit: 450
        reason: "Flow orchestrator 服务测试集，覆盖 dispatch 协调、frozen queue 管理、issue 状态处理等紧密耦合场景，共享 fixture，拆分收益低"


  total_file_loc:
    v2_shell: 3000         # Shell 核心代码总行数
    # Python LOC reduction milestones (Issue #274)
    # Current: 45,894 LOC (as of 2026-05-01)
    # Milestone 1: 45,000 LOC (intermediate target)
    # Milestone 2: 40,000 LOC (stretch target)
    # Final target: 35,000 LOC (governance goal)
    v3_python: 60000        # Python 核心代码总行数
    warning_threshold_percent: 90  # Trigger warning at 90% of limit (Issue #625)
    last_reviewed: "2026-05-01"    # Track last governance review (Issue #625)

  # 统计口径（路径定义）
  code_paths:
    v2_shell:              # Shell 核心代码路径
      - "lib/"
      - "lib3/"
      - "bin/vibe"
    v3_python:             # Python 核心代码路径
      - "src/vibe3/"

  scripts_paths:
    v2_shell:              # Shell 工具脚本路径
      - "scripts/"
    v3_python:             # Python 工具脚本路径
      - "scripts/"

  test_paths:
    v2_shell:              # Shell 测试路径
      - "tests/vibe2/"
    v3_python:             # Python 测试路径
      - "tests/vibe3/"
