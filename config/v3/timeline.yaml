# Timeline Comment Policy 配置
# 控制 timeline 事件是否写入 GitHub issue comment

# 不写 comment 的事件分类
no_comment:
  # 内部状态同步（信息已在 issue body 或状态变更中体现）
  state_sync:
    - flow_blocked
    - resumed
    - flow_aborted

  # 运行时错误（通过 vibe3 serve status 查看）
  runtime_error:
    - flow_failed

  # Artifact 文件路径引用（comment 中文件路径无意义）
  artifact_ref:
    - handoff_plan
    - handoff_report
    - handoff_audit
    - handoff_indicate
    - plan_recorded
    - report_recorded

# 写 comment 的事件分类
write_comment:
  # 重要里程碑
  milestone:
    - handoff_append
    - milestone_recorded

  # 人类可读的状态变化
  human_readable:
    - user_notification
