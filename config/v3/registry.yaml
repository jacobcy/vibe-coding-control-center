# Configuration Governance Registry
# See docs/standards/configuration-standard.md for field definitions

flow:
  source_file: "config/v3/settings.yaml"
  schema: "src/vibe3/config/settings.py:FlowConfig"
  consumers:
    - "src/vibe3/services/flow_service.py"
  tests:
    - "tests/vibe3/services/test_flow_service.py"
  status: "active"

ai:
  source_file: "config/v3/settings.yaml"
  schema: "src/vibe3/config/settings.py:AIConfig"
  consumers:
    - "src/vibe3/clients/ai_suggestion_client.py"
    - "src/vibe3/services/pr_create_usecase.py"
  tests:
    - "tests/vibe3/clients/test_ai_suggestion_client.py"
  status: "active"

code_limits:
  source_file: "config/v3/loc_limits.yaml"
  schema: "src/vibe3/config/settings.py:CodeLimitsConfig"
  consumers:
    - "scripts/hooks/check-python-loc.sh"
    - "scripts/hooks/check-shell-loc.sh"
    - "scripts/hooks/check-per-file-loc.sh"
    - "scripts/hooks/check-test-file-loc.sh"
  tests:
    - "tests/vibe3/hooks/test_loc_settings.py"
  status: "active"

sync_rules:
  source_file: "config/v3/sync_rules.yaml"
  schema: "src/vibe3/clients/sync_rules.py:SyncRulesConfig"
  consumers:
    - "src/vibe3/clients/label_utils.py"
    - "src/vibe3/orchestra/remote_check.py"
    - "src/vibe3/services/check/service.py"
  tests:
    - "tests/vibe3/clients/test_sync_rules.py"
    - "tests/vibe3/clients/test_label_utils_sync_rules.py"
    - "tests/vibe3/services/test_check_sync_rules.py"
  status: "active"

doc_limits:
  source_file: "config/v3/loc_limits.yaml"
  schema: "src/vibe3/config/settings.py:DocLimitsConfig"
  consumers: []
  tests: []
  status: "active"
  notes:
    - "Wired via VibeConfig._load_supplementary()"
    - "No direct consumers yet - used for documentation LOC checks"

review_scope:
  source_file: "config/v3/settings.yaml"
  schema: "src/vibe3/config/settings.py:ReviewScopeConfig"
  consumers: []
  tests: []
  status: "active"

quality:
  source_file: "config/v3/settings.yaml"
  schema: "src/vibe3/config/settings.py:QualityConfig"
  consumers: []
  tests: []
  status: "active"
  notes:
    - "Test coverage requirements - not yet enforced in CI"

review:
  source_file: "config/v3/settings.yaml"
  schema: "src/vibe3/config/settings.py:ReviewConfig"
  consumers:
    - "src/vibe3/agents/review_prompt.py"
    - "src/vibe3/commands/review_cmd.py"
  tests:
    - "tests/vibe3/agents/test_review_prompt.py"
  status: "active"
  notes:
    - "Owns review policy path and agent execution config only."
    - "Prompt text fields are merged from config/prompts/prompts.yaml."
    - "Section order is owned by config/prompts/prompt-recipes.yaml."

plan:
  source_file: "config/v3/settings.yaml"
  schema: "src/vibe3/config/settings.py:PlanConfig"
  consumers:
    - "src/vibe3/commands/plan_cmd.py"
  tests: []
  status: "active"
  notes:
    - "Owns plan policy path and agent execution config only."
    - "Prompt text fields are merged from config/prompts/prompts.yaml."
    - "Section order is owned by config/prompts/prompt-recipes.yaml."

run:
  source_file: "config/v3/settings.yaml"
  schema: "src/vibe3/config/settings.py:RunConfig"
  consumers:
    - "src/vibe3/commands/run_cmd.py"
  tests: []
  status: "active"
  notes:
    - "Owns run policy path and agent execution config only."
    - "Prompt text fields are merged from config/prompts/prompts.yaml."
    - "Section order is owned by config/prompts/prompt-recipes.yaml."

orchestra:
  source_file: "config/v3/settings.yaml"
  schema: "src/vibe3/models/orchestra_config.py:OrchestraConfig"
  consumers:
    - "src/vibe3/orchestra/serve.py"
    - "src/vibe3/orchestra/dispatch.py"
  tests:
    - "tests/vibe3/orchestra/test_serve.py"
  status: "active"

models:
  source_file: "config/v3/models.json"
  schema: "N/A (JSON schema)"
  consumers:
    - "src/vibe3/agents/preset_resolver.py"
  tests:
    - "tests/vibe3/agents/test_agent_preset_resolution.py"
  status: "active"

prompt_recipes:
  source_file: "config/prompts/prompt-recipes.yaml"
  schema: "src/vibe3/prompts/manifest.py:PromptManifest"
  consumers:
    - "src/vibe3/prompts/manifest.py"
    - "src/vibe3/roles/manager.py"
    - "src/vibe3/roles/supervisor.py"
    - "src/vibe3/roles/governance.py"
    - "src/vibe3/agents/run_prompt.py"
    - "src/vibe3/agents/plan_prompt.py"
    - "src/vibe3/agents/review_prompt.py"
  tests:
    - "tests/vibe3/prompts/test_prompt_manifest.py"
  status: "active"
  notes:
    - "Owns section ordering and material source declarations."
    - "Supports two recipe kinds: section_recipe (manager/run/plan/review) and template_recipe (governance/supervisor)."
    - "Manager supervisor content from manager.default.first.bootstrap.sections[].source."
    - "Supervisor handoff content from supervisor.handoff.variables.supervisor_content."
    - "Governance materials from governance.scan.material_catalog (round-robin tick selection)."
    - "Prompt body text remains in config/prompts/prompts.yaml."

prompt_text:
  source_file: "config/prompts/prompts.yaml"
  schema: "src/vibe3/config/settings.py:_PROMPT_KEYS"
  consumers:
    - "src/vibe3/config/settings.py"
    - "src/vibe3/prompts/template_loader.py"
    - "src/vibe3/agents/run_prompt.py"
    - "src/vibe3/agents/plan_prompt.py"
    - "src/vibe3/agents/review_prompt.py"
    - "src/vibe3/roles/governance.py"
    - "src/vibe3/roles/manager.py"
  tests:
    - "tests/vibe3/config/test_migrated_config_paths.py"
    - "tests/vibe3/agents/test_run_prompt.py"
    - "tests/vibe3/agents/test_review_prompt.py"
    - "tests/vibe3/agents/test_plan_prompt.py"
  status: "active"
  notes:
    - "Owns prompt text/output contracts/retry guidance."
    - "config/v3/settings.yaml must not define these fields; loader fails fast."
