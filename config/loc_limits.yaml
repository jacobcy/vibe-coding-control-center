# File Size Exceptions Configuration
#
# Files exceeding 400-line guideline must register here with justification.
# Criteria for exception approval:
# - Maintains high cohesion (related logic stays together)
# - Refactoring would reduce readability or testability
# - Complex domain logic that benefits from single-file view

file_size_exceptions:
  - path: src/vibe3/services/orchestra_status_service.py
    lines: 454
    reason: >
      Core orchestra status management service with high cohesion:
      - Snapshot building with live HTTP fetch integration
      - Issue status aggregation and priority sorting
      - Circuit breaker state tracking
      - Queue ranking and metadata handling
      Splitting would reduce maintainability and testability of
      interdependent status collection logic.

# Total LOC budget tracking (for monitoring)
# lib/ + bin/ + lib3/ target: < 7000 lines
# src/ target: < 45000 lines