# Prompt Assembly Recipes
#
# 本文件只描述”角色 prompt 的 section 装配顺序”，不保存 prompt 正文。
# prompt 正文和模板在 config/prompts/prompts.yaml。
#
# 重要边界：
# - 这里覆盖 manager / planner / executor / reviewer 这类 role prompt。
# - pr.title_suggestion、pr.body_suggestion 是 AI 文案建议模板，
#   由 AISuggestionClient 直接使用，不属于本装配表。
#
# 运行时迁移状态：
# - manager.* / run.* / plan.* / review.* 已经由对应 agents/*_prompt.py 读取本文件。
#
# section 命名约定：
# - *.policy：角色 policy 文件内容。
# - common.rules：共享 agent 规则。
# - *.output_format：输出形状/格式要求。review 的 output_format 是 verdict 硬契约。
# - *.retry_task：retry 场景指导。
# - *.exit_contract：每轮都应强调的收尾契约，通常包含 canonical ref 注册和 label transition。

recipes:
  # Manager role assembly.
  #
  # Design intent:
  # - bootstrap includes full supervisor_content for first dispatch.
  # - retry.resume avoids re-sending full supervisor_content and keeps only
  #   retry guidance plus quick scene commands.
  manager.default:
    kind: section_recipe
    template_key: assignee_dispatch.manager
    description: Manager prompt assembly target.
    variants:
      first.bootstrap:
        sections:
          - key: manager.supervisor_content
            source:
              kind: file
              path: supervisor/manager.md
          - key: manager.target
          - key: manager.quick_commands

      retry.resume:
        sections:
          - manager.retry_task

  # Executor role, plan/flow_plan/lightweight modes.
  #
  # Variant selection:
  # - coding.bootstrap：首次/常规执行，没有 report_ref/audit_ref retry 语义。
  # - retry.bootstrap：有 retry refs，但没有可复用 executor session，需要完整上下文。
  # - retry.resume：有 retry refs 且已有 session，只补 retry 指令和 exit contract。
  run.plan:
    template_key: run.plan
    description: Executor prompt for plan-based implementation or retry work.
    variants:
      coding.bootstrap:
        sections:
          - key: run.plan_ref
            source:
              kind: provider
              provider: run.plan_ref
          - key: run.coding_task
            source:
              kind: provider
              provider: run.coding_task
          - key: run.policy
            source:
              kind: provider
              provider: run.policy
          - key: run.policy@project
            source:
              kind: provider
              provider: run.policy@project
          - key: common.rules
            source:
              kind: provider
              provider: common.rules
          - key: common.rules@project
            source:
              kind: provider
              provider: common.rules@project
          - key: run.output_format
            source:
              kind: provider
              provider: run.output_format
          - key: run.exit_contract
            source:
              kind: provider
              provider: run.exit_contract

      retry.bootstrap:
        sections:
          - key: run.plan_ref
            source:
              kind: provider
              provider: run.plan_ref
          - key: run.retry_task
            source:
              kind: provider
              provider: run.retry_task
          - key: run.policy
            source:
              kind: provider
              provider: run.policy
          - key: run.policy@project
            source:
              kind: provider
              provider: run.policy@project
          - key: common.rules
            source:
              kind: provider
              provider: common.rules
          - key: common.rules@project
            source:
              kind: provider
              provider: common.rules@project
          - key: run.output_format
            source:
              kind: provider
              provider: run.output_format
          - key: run.exit_contract
            source:
              kind: provider
              provider: run.exit_contract

      retry.resume:
        sections:
          - key: run.retry_task
            source:
              kind: provider
              provider: run.retry_task
          - key: run.exit_contract
            source:
              kind: provider
              provider: run.exit_contract

  run.skill:
    template_key: run.skill
    description: Executor prompt for skill-driven work.
    variants:
      default:
        sections:
          - run.skill_content
          - run.exit_contract

  run.publish:
    template_key: run.skill
    description: Executor prompt for publish path (commit_mode, merge-ready → handoff).
    variants:
      default:
        sections:
          - run.skill_content
          - run.publish_exit_contract

  # Planner role assembly.
  #
  # Design intent:
  # - bootstrap includes policy/common rules/output shape/exit contract.
  # - retry.resume avoids re-sending policy/common/output shape and keeps only
  #   retry guidance plus plan.exit_contract.
  plan.default:
    template_key: plan.default
    description: Planner prompt assembly target.
    variants:
      first.bootstrap:
        sections:
          - key: plan.policy
            source:
              kind: provider
              provider: plan.policy
          - key: plan.policy@project
            source:
              kind: provider
              provider: plan.policy@project
          - key: common.rules
            source:
              kind: provider
              provider: common.rules
          - key: common.rules@project
            source:
              kind: provider
              provider: common.rules@project
          - key: plan.output_format
            source:
              kind: provider
              provider: plan.output_format
          - key: plan.exit_contract
            source:
              kind: provider
              provider: plan.exit_contract
          - key: plan.task
            source:
              kind: provider
              provider: plan.task

      retry.bootstrap:
        sections:
          - key: plan.policy
            source:
              kind: provider
              provider: plan.policy
          - key: plan.policy@project
            source:
              kind: provider
              provider: plan.policy@project
          - key: common.rules
            source:
              kind: provider
              provider: common.rules
          - key: common.rules@project
            source:
              kind: provider
              provider: common.rules@project
          - key: plan.output_format
            source:
              kind: provider
              provider: plan.output_format
          - key: plan.retry_task
            source:
              kind: provider
              provider: plan.retry_task
          - key: plan.exit_contract
            source:
              kind: provider
              provider: plan.exit_contract
          - key: plan.task
            source:
              kind: provider
              provider: plan.task

      retry.resume:
        sections:
          - key: plan.retry_task
            source:
              kind: provider
              provider: plan.retry_task
          - key: plan.exit_contract
            source:
              kind: provider
              provider: plan.exit_contract
          - key: plan.task
            source:
              kind: provider
              provider: plan.task

  # Reviewer role assembly.
  #
  # Design intent:
  # - review.output_format is kept even in retry.resume because VERDICT is a hard contract.
  # - review.exit_contract is kept every round for verdict/audit_ref/label transition.
  review.default:
    template_key: review.default
    description: Reviewer prompt assembly target.
    variants:
      first.bootstrap:
        sections:
          - key: review.policy
            source:
              kind: provider
              provider: review.policy
          - key: review.policy@project
            source:
              kind: provider
              provider: review.policy@project
          - key: common.rules
            source:
              kind: provider
              provider: common.rules
          - key: common.rules@project
            source:
              kind: provider
              provider: common.rules@project
          - key: review.snapshot_diff
            source:
              kind: provider
              provider: review.snapshot_diff
          - key: review.ast_analysis
            source:
              kind: provider
              provider: review.ast_analysis
          - key: review.output_format
            source:
              kind: provider
              provider: review.output_format
          - key: review.exit_contract
            source:
              kind: provider
              provider: review.exit_contract

      retry.bootstrap:
        sections:
          - key: review.policy
            source:
              kind: provider
              provider: review.policy
          - key: review.policy@project
            source:
              kind: provider
              provider: review.policy@project
          - key: common.rules
            source:
              kind: provider
              provider: common.rules
          - key: common.rules@project
            source:
              kind: provider
              provider: common.rules@project
          - key: review.snapshot_diff
            source:
              kind: provider
              provider: review.snapshot_diff
          - key: review.ast_analysis
            source:
              kind: provider
              provider: review.ast_analysis
          - key: review.output_format
            source:
              kind: provider
              provider: review.output_format
          - key: review.retry_task
            source:
              kind: provider
              provider: review.retry_task
          - key: review.exit_contract
            source:
              kind: provider
              provider: review.exit_contract

      retry.resume:
        sections:
          - key: review.output_format
            source:
              kind: provider
              provider: review.output_format
          - key: review.retry_task
            source:
              kind: provider
              provider: review.retry_task
          - key: review.exit_contract
            source:
              kind: provider
              provider: review.exit_contract

  # Supervisor handoff role.
  #
  # Direct template recipe for supervisor handoff execution.
  # Variables are resolved at runtime from snapshot context.
  supervisor.handoff:
    kind: template_recipe
    template_key: orchestra.supervisor.apply
    variables:
      supervisor_name:
        kind: literal
        value: supervisor/apply.md
      supervisor_content:
        kind: file
        path: supervisor/apply.md
      server_status:
        kind: provider
        provider: governance.server_status
      active_count:
        kind: provider
        provider: governance.active_count
      active_flows:
        kind: provider
        provider: governance.active_flows
      active_worktrees:
        kind: provider
        provider: governance.active_worktrees
      running_issue_count:
        kind: provider
        provider: governance.running_issue_count
      queued_issue_count:
        kind: provider
        provider: governance.queued_issue_count
      suggested_issue_count:
        kind: provider
        provider: governance.suggested_issue_count
      circuit_breaker_state:
        kind: provider
        provider: governance.circuit_breaker_state
      circuit_breaker_failures:
        kind: provider
        provider: governance.circuit_breaker_failures
      issue_list:
        kind: provider
        provider: governance.issue_list
      running_issue_details:
        kind: provider
        provider: governance.running_issue_details
      suggested_issue_details:
        kind: provider
        provider: governance.suggested_issue_details
      truncated_note:
        kind: provider
        provider: governance.truncated_note

  # Governance role.
  #
  # Template recipe with material catalog for round-robin tick selection.
  # Python tick_count selects from material_catalog array.
  governance.scan:
    kind: template_recipe
    template_key: orchestra.governance.plan
    material_catalog:
      - name: supervisor/governance/assignee-pool.md
        source:
          kind: file
          path: supervisor/governance/assignee-pool.md
      - name: supervisor/governance/roadmap-intake.md
        source:
          kind: file
          path: supervisor/governance/roadmap-intake.md
      - name: supervisor/governance/cron-supervisor.md
        source:
          kind: file
          path: supervisor/governance/cron-supervisor.md
      - name: supervisor/governance/code-auditor.md
        source:
          kind: file
          path: supervisor/governance/code-auditor.md
      - name: supervisor/governance/audit-observation.md
        source:
          kind: file
          path: supervisor/governance/audit-observation.md
      - name: supervisor/governance/audit-suggestion.md
        source:
          kind: file
          path: supervisor/governance/audit-suggestion.md
      - name: supervisor/governance/audit-report.md
        source:
          kind: file
          path: supervisor/governance/audit-report.md
      - name: supervisor/governance/audit-decision.md
        source:
          kind: file
          path: supervisor/governance/audit-decision.md
    variables:
      server_status:
        kind: provider
        provider: governance.server_status
      active_count:
        kind: provider
        provider: governance.active_count
      active_flows:
        kind: provider
        provider: governance.active_flows
      active_worktrees:
        kind: provider
        provider: governance.active_worktrees
      running_issue_count:
        kind: provider
        provider: governance.running_issue_count
      queued_issue_count:
        kind: provider
        provider: governance.queued_issue_count
      suggested_issue_count:
        kind: provider
        provider: governance.suggested_issue_count
      circuit_breaker_state:
        kind: provider
        provider: governance.circuit_breaker_state
      circuit_breaker_failures:
        kind: provider
        provider: governance.circuit_breaker_failures
      issue_list:
        kind: provider
        provider: governance.issue_list
      running_issue_details:
        kind: provider
        provider: governance.running_issue_details
      suggested_issue_details:
        kind: provider
        provider: governance.suggested_issue_details
      truncated_note:
        kind: provider
        provider: governance.truncated_note
