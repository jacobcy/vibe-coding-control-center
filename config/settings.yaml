# Vibe Center 配置文件
# 用于管理代码质量限制、审核范围、质量标准等

# 代码量控制
code_limits:
  single_file_loc:
    default: 200           # 单文件默认限制（所有类型）
    max: 300              # 单文件最大限制（所有类型）

  total_file_loc:
    v2_shell: 7000         # Shell 核心代码总行数
    v3_python: 15000        # Python 核心代码总行数

  # 统计口径（路径定义）
  code_paths:
    v2_shell:              # Shell 核心代码路径
      - "lib/"
      - "lib3/"
      - "bin/vibe"
    v3_python:             # Python 核心代码路径
      - "src/vibe3/"

  scripts_paths:
    v2_shell:              # Shell 工具脚本路径
      - "scripts/"
    v3_python:             # Python 工具脚本路径
      - "scripts/"

  test_paths:
    v2_shell:              # Shell 测试路径
      - "tests/vibe2/"
    v3_python:             # Python 测试路径
      - "tests/vibe3/"

# 审核范围（适配 vibe-center 实际结构）
# 用于判断改动文件是否属于关键路径或公开 API
review_scope:
  # 关键路径：改动这些路径需要额外关注
  # 用于 risk assessment 的 critical_path_touch 维度
  # 适用范围：整个项目的所有改动文件（不限于 src/vibe3）
  #
  # 注意：只标记真正核心的文件/路径，避免过度标记
  # - 太宽泛（如整个 services/）会导致几乎所有改动都被标记为 critical
  # - 应该只标记：核心流程、关键基础设施、影响全局的代码
  critical_paths:
    # V2 (Shell) - 核心流程
    - "lib/flow.sh"        # Flow 主入口
    - "lib/flow_checkout"  # Flow checkout 逻辑
    - "lib/flow_done"      # Flow done 逻辑
    - "lib/flow_pr"        # Flow PR 逻辑
    - "lib/flow_review"    # Flow review 逻辑

    # V3 (Python) - 核心服务和基础设施
    - "src/vibe3/services/flow_service.py"       # Flow 核心服务
    - "src/vibe3/services/review_runner.py"      # Review 执行器
    - "src/vibe3/services/pr_scoring_service.py" # PR 评分服务
    - "src/vibe3/clients/git_client.py"          # Git 客户端
    - "src/vibe3/clients/github_client.py"       # GitHub 客户端

  # 公开 API：改动这些路径可能影响兼容性
  # 用于 risk assessment 的 public_api_touch 维度
  # 适用范围：整个项目的所有改动文件（不限于 src/vibe3）
  public_api_paths:
    # V2 (Shell) - 公开接口
    - "bin/vibe"             # 主入口
    - "lib/flow.sh"         # Flow 公开接口

    # V3 (Python) - 命令层（公开 API）
    - "src/vibe3/commands/"  # v3 命令层

# Review 配置
# Review Configuration
# =====================
# Data sources:
# - Static: Read from config file at runtime
# - Runtime: Injected by code (e.g., changed_symbols from inspect)
#
# Configuration boundaries:
# - This file: Static policy/agent/output config
# - Runtime code: AST analysis (changed_symbols, symbol_dag)
# - Command line: Task guidance (--message option)
review:
  # Static: Path to review policy markdown file
  policy_file: ".codex/review-policy.md"

  # Static: Path to tools guide markdown file
  tools_guide_file: ".agent/rules/cli-usage.md"

  # Static: Agent configuration for codeagent-wrapper
  agent_config:
    # Method 1: Use agent preset (recommended)
    agent: "code-reviewer"

    # Method 2: Direct backend/model specification (alternative)
    # backend: "claude"
    # model: "claude-3-opus"  # optional

  # Static: Output format requirements (VERDICT contract)
  output_format: |
    Each finding should follow this format:
    path/to/file.py:42 [MAJOR] concise issue description

    The final line must be:
    VERDICT: PASS | MAJOR | BLOCK

    Where:
    - PASS: No significant issues found
    - MAJOR: Issues found that should be addressed before merge
    - BLOCK: Critical issues that must be fixed before merge

  # Static: Default review task guidance
  # Can be overridden via CLI: vibe review pr 42 --message "Focus on security"
  review_task: |
    - Run `git diff <base>...HEAD` to see file changes
    - Review only changed code, not the entire codebase
    - Use AST analysis to understand function-level impact
    - Prioritize: correctness, regression risk, API breaks
    - Focus on actionable, specific findings

  # Static: Custom review prompt (optional prefix)
  # Added to beginning of review context if provided
  review_prompt: "/code-review"

# 质量标准
quality:
  test_coverage:
    services: 80             # Services 层 ≥ 80%
    clients: 70              # Clients 层 ≥ 70%
    commands: 60             # Commands 层 ≥ 60%

# PR 评分配置
pr_scoring:
  # Size thresholds (when to upgrade from small to medium to large)
  size_thresholds:
    changed_lines:
      small: 50        # <50 lines = small (0 points)
      medium: 200      # 50-200 lines = medium (1 point)
      large: 500       # 200-500 lines = large (1 point), >500 = xlarge (2 points)
    changed_files:
      small: 4         # 1-3 files = small (0 points)
      medium: 10       # 4-10 files = medium (1 point), >10 = large (1 point)
    impacted_modules:
      small: 2         # 1 module = small (0 points)
      medium: 5        # 2-4 modules = medium (1 point), ≥5 = large (2 points)

  # Points for each dimension
  weights:
    changed_lines:
      small: 0
      medium: 1
      large: 2         # Lowered from 2 (pre-push shouldn't over-penalize normal features)
      xlarge: 3
    changed_files:
      small: 0
      medium: 1
      large: 2         # Lowered from 2 (10+ files is reasonable for feature work)
    impacted_modules:
      small: 0
      medium: 1
      large: 2

    # Context dimensions (only used for PR review, not pre-push)
    critical_path_touch: 2
    public_api_touch: 2
    cross_module_symbol_change: 2    # Not used in pre-push
    codex_major: 3                    # Not used in pre-push
    codex_critical: 5                 # Not used in pre-push

  # Risk level thresholds (for display/labeling purposes)
  # These determine the risk level label (LOW/MEDIUM/HIGH/CRITICAL)
  # Example: score=7 → HIGH (because 6 <= 7 < 9)
  thresholds:
    medium: 3     # score >= 3 → MEDIUM risk
    high: 6       # score >= 6 → HIGH risk
    critical: 9   # score >= 9 → CRITICAL risk

  # Merge gate configuration (for action/behavior)
  # Controls whether to block and require review
  merge_gate:
    # Block pre-push if score >= this value
    # Note: This is separate from risk level thresholds
    # Example: score=10 → CRITICAL level, but NOT blocked (10 < 12)
    # Example: score=12 → CRITICAL level, AND blocked (12 >= 12)
    block_on_score_at_or_above: 10  # Raised from 9 to reduce false positives

    # Always block if codex returns these verdicts
    block_on_verdict:
      - "BLOCK"

# GitHub Projects v2 配置（Task Bridge 真源）
# project_number 和 owner 是 task bridge 的远端真源配置
# owner_type: "user" 表示个人账号，"org" 表示组织
github_project:
  owner_type: "user"
  owner: "jacobcy"
  project_number: 17
  org: ""             # 已废弃，请使用 owner

# AI 辅助配置
# 用于 flow new --ai 和 pr create --ai 功能
# API Key 通过环境变量配置: DEEPSEEK_API_KEY
ai:
  api_key_env: "DEEPSEEK_API_KEY"  # 环境变量名
  base_url: "https://api.deepseek.com/v1"  # DeepSeek API endpoint
  model: "deepseek/deepseek-chat"  # litellm 格式: provider/model
  timeout: 30                 # 超时秒数
