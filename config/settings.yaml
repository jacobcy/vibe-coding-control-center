# Vibe Center 配置文件
# 用于管理代码质量限制、审核范围、质量标准等

# Flow 配置
# 控制流程管理行为
flow:
  # 受保护的主分支列表
  # 这些分支禁止创建 flow，强制在特性分支上工作
  protected_branches:
    - "main"
    - "master"
    - "develop"

# GitHub Projects v2 配置（Task Bridge 真源）
# project_number 和 owner 是 task bridge 的远端真源配置
# owner_type: "user" 表示个人账号，"org" 表示组织
github_project:
  owner_type: "user"
  owner: "jacobcy"
  project_number: 17
  org: ""             # 已废弃，请使用 owner

# AI 辅助配置
# 用于 AI 文案辅助能力（如 pr create --ai）
# API Key 通过环境变量配置: DEEPSEEK_API_KEY
ai:
  api_key_env: "DEEPSEEK_API_KEY"  # 环境变量名
  base_url: "https://api.deepseek.com/v1"  # DeepSeek API endpoint
  model: "deepseek/deepseek-chat"  # litellm 格式: provider/model
  timeout: 30                 # 超时秒数

# Agent Prompt 全局说明
# 会置顶注入到所有 codeagent prompt 文件中
agent_prompt:
  global_notice: |
    ## Handoff 写入规则
    不要直接访问或编辑主仓库的 `.git/vibe3/handoff/` 目录（该路径在 worktree 中会触发 external_directory 权限拒绝）。
    所有 handoff 操作必须通过 CLI 命令完成：
    - 追加记录：`uv run python src/vibe3/cli.py handoff append "<内容>"`
    - 读取记录：`uv run python src/vibe3/cli.py handoff show`

    ## Debug Stop Rule
    当前项目处于调试过程中。
    如果任何工具重试两次后仍然报错，并且该错误会导致任务无法完成，必须停止当前任务。
    不要继续尝试其他替代方法。
    请改为：
    1. 通过 issue 或 handoff 明确记录失败现象、已尝试步骤和阻塞原因。
    2. 结束当前任务，等待人工或后续任务接手。

    ## Time out Rule
    你有一个小时的时间来完成任务，如果你无法完成，请在时间窗口内通过issue或handoff记录你已完成的工作或findings，并在deadline前exit()，等待人工或后续任务接手。时间耗尽，你的工作空间会被Cancel，可能导致系统中断。

# 文本量控制
doc_limits:
  single_file_loc:
    default: 500           # 单文件默认限制（所有类型）
    max: 800              # 单文件最大限制（所有类型）

# 代码量控制
code_limits:
  single_file_loc:
    default: 300           # 单文件默认限制（所有类型）
    max: 400              # 单文件最大限制（所有类型）

# 例外清单：核心聚合文件、兼容入口、强耦合测试允许适度超标
    # 原则：LOC 上限是治理触发器而非硬性阻塞，命中时触发质量回收审计
    exceptions:
      # 核心业务聚合 —— 允许 600
      - path: "src/vibe3/services/flow_service.py"
        limit: 600
        reason: "核心状态机聚合，吸收 flow_query_mixin"
      - path: "src/vibe3/services/pr_service.py"
        limit: 600
        reason: "PR 生命周期聚合"
      - path: "src/vibe3/services/check_service.py"
        limit: 600
        reason: "校验聚合服务，核心校验链路不适合再细碎拆分"
      - path: "src/vibe3/services/issue_failure_service.py"
        limit: 600
        reason: "Issue 状态异常转换聚合，职责单一 (fail/block/resume/confirm)，辅助函数共享，与测试对称"
      - path: "src/vibe3/services/task_resume_operations.py"
        limit: 450
        reason: "Task resume 操作聚合，包含 reset、label resume 等内聚操作"
      - path: "src/vibe3/services/handoff_service.py"
        limit: 500
        reason: "Handoff 记录管理核心服务，内聚度高，模板函数共生"

      # Clients 聚合 —— 允许 500
      - path: "src/vibe3/clients/git_client.py"
        limit: 500
        reason: "Git 门面聚合"
      - path: "src/vibe3/clients/github_pr_ops.py"
        limit: 500
        reason: "GitHub PR 操作与查询聚合"
      - path: "src/vibe3/clients/sqlite_client.py"
        limit: 650
        reason: "持久化聚合（flow_state/events/runtime_session 统一入口）"

      # Commands 层 —— 允许 440-480
      - path: "src/vibe3/commands/task.py"
        limit: 480
        reason: "Task 命令聚合，包含 resume、list、多个子命令入口"
      - path: "src/vibe3/commands/status.py"
        limit: 460
        reason: "Status 命令聚合，包含 flow/session/orchestra 多维度状态展示"

      # Services 层 —— 允许 400-500
      - path: "src/vibe3/services/status_query_service.py"
        limit: 450
        reason: "Status 查询服务，聚合 orchestra/flow/task 多维度查询逻辑"
      - path: "src/vibe3/services/task_service.py"
        limit: 450
        reason: "Task 服务聚合，包含状态转换、查询、resume 候选筛选逻辑"

      # Roles 层 —— 允许 350-600
      - path: "src/vibe3/roles/review.py"
        limit: 600
        reason: "Reviewer 角色聚合，包含 request builder、sync/async dispatch、parser 集成"
      - path: "src/vibe3/roles/run.py"
        limit: 600
        reason: "Executor 角色聚合，包含 request builder、sync/async dispatch、manual run 入口"
      - path: "src/vibe3/roles/manager.py"
        limit: 420
        reason: "Manager 角色聚合，包含 flow 状态机、dispatch 协调、issue 管理"
      - path: "src/vibe3/roles/governance.py"
        limit: 450
        reason: "Governance 角色聚合，包含 supervisor 材料组装、issue 扫描、dispatch 逻辑"

      # Server —— 允许 470
      - path: "src/vibe3/server/app.py"
        limit: 470
        reason: "Orchestra CLI 入口聚合，职责单一"
      - path: "src/vibe3/server/registry.py"
        limit: 420
        reason: "Orchestra PID/tmux 管理，多进程协调辅助函数共生"

      # Shell / 脚本兼容入口
      - path: "lib/alias/worktree.sh"
        limit: 500
        reason: "Shell worktree 入口聚合别名与辅助函数，维持单文件更符合使用方式"
      - path: "lib/keys_support.sh"
        limit: 500
        reason: "Keys 工具函数集合（trim、plugin scope hint 等），职责单一但函数较多"
      - path: "scripts/tsu.sh"
        limit: 900
        reason: "外部集成脚本，保持独立发布形态，不按常规模块拆分"

      # 基础设施核心模块
      - path: "src/vibe3/environment/worktree.py"
        limit: 600
        reason: "Worktree lifecycle management"
      - path: "src/vibe3/environment/session_registry.py"
        limit: 470
        reason: "Session 生命周期聚合，包含状态对账、容量统计、活跃检查等紧密耦合逻辑"
      - path: "src/vibe3/agents/backends/codeagent.py"
        limit: 610
        reason: "Codeagent execution backend（命令构建/tmux/同步异步执行紧密耦合）"
      - path: "src/vibe3/agents/backends/async_launcher.py"
        limit: 470
        reason: "Async launcher 工具类，包含 tmux 会话管理、日志路径分配、Codex 噪声过滤、wrapper 脚本启动四个高内聚模块"
      - path: "src/vibe3/services/orchestra_status_service.py"
        limit: 450
        reason: "Orchestra 状态查询服务，包含状态快照和格式化逻辑，职责单一但方法较多"
      - path: "src/vibe3/orchestra/services/state_label_dispatch.py"
        limit: 450
        reason: "State label dispatch 服务，包含依赖检查、状态查询、事件发射等紧密耦合的调度逻辑"

      # 强耦合测试例外
      - path: "tests/vibe3/agents/test_codeagent_backend.py"
        limit: 600
        reason: "Codeagent backend 核心测试，覆盖 sync/async 执行、tmux 管理、命令构建等紧密耦合逻辑"
      - path: "tests/vibe3/agents/test_codeagent_async.py"
        limit: 500
        reason: "Codeagent async 执行测试集，覆盖异步启动、日志收集、错误处理等场景，共享 fixture"
      - path: "tests/vibe3/agents/test_codeagent_config.py"
        limit: 500
        reason: "Codeagent config 测试集，覆盖 preset 解析、fallback、migration 场景，逻辑清晰且符合测试最佳实践"
      - path: "tests/vibe3/execution/test_execution_lifecycle.py"
        limit: 550
        reason: "Execution lifecycle 测试集，5 个测试类围绕同一服务契约，共享 fixture"
      - path: "tests/vibe3/execution/test_coordinator.py"
        limit: 600
        reason: "Coordinator 核心测试，12 个测试函数围绕调度逻辑（async/sync dispatch、capacity、error handling），共享 mock_dependencies fixture，拆分收益低"
      - path: "tests/vibe3/environment/test_worktree_branch_from_pr.py"
        limit: 450
        reason: "Worktree branch-from-PR 测试，多场景覆盖 pre-existing branch、PR base、状态标签等，共享 fixture"
      - path: "tests/vibe3/roles/test_governance.py"
        limit: 500
        reason: "Governance 角色测试集，覆盖 supervisor 材料组装、issue 扫描、dispatch 逻辑等多个紧密耦合场景"
      - path: "tests/vibe3/roles/test_review.py"
        limit: 450
        reason: "Review 角色测试集，覆盖 request builder、sync/async dispatch、parser 集成等紧密耦合逻辑"
      - path: "tests/vibe3/orchestra/test_global_dispatch_coordinator.py"
        limit: 500
        reason: "Global dispatch coordinator 集成测试，覆盖队列管理、冻结逻辑、状态转换等核心调度场景"
      - path: "tests/vibe3/execution/test_codeagent_runner_gate.py"
        limit: 450
        reason: "Gate 集成测试，包含完整的 mock 设置和断言场景，拆分会破坏测试逻辑完整性"

  total_file_loc:
    v2_shell: 3000         # Shell 核心代码总行数
    v3_python: 45000        # Python 核心代码总行数（治理触发器：命中时触发质量回收审计）

  # 统计口径（路径定义）
  code_paths:
    v2_shell:              # Shell 核心代码路径
      - "lib/"
      - "lib3/"
      - "bin/vibe"
    v3_python:             # Python 核心代码路径
      - "src/vibe3/"

  scripts_paths:
    v2_shell:              # Shell 工具脚本路径
      - "scripts/"
    v3_python:             # Python 工具脚本路径
      - "scripts/"

  test_paths:
    v2_shell:              # Shell 测试路径
      - "tests/vibe2/"
    v3_python:             # Python 测试路径
      - "tests/vibe3/"

# 审核范围（适配 vibe-center 实际结构）
# 用于判断改动文件是否属于关键路径或公开 API
review_scope:
  # 关键路径：改动这些路径需要额外关注
  # 用于 risk assessment 的 critical_path_touch 维度
  # 适用范围：整个项目的所有改动文件（不限于 src/vibe3）
  #
  # 注意：只标记真正核心的文件/路径，避免过度标记
  # - 太宽泛（如整个 services/）会导致几乎所有改动都被标记为 critical
  # - 应该只标记：核心流程、关键基础设施、影响全局的代码
  critical_paths:

    # V3 (Python) - 核心服务和基础设施
    - "src/vibe3/services/flow_service.py"       # Flow 核心服务
    - "src/vibe3/services/review_runner.py"      # Review 执行器
    - "src/vibe3/services/pr_scoring_service.py" # PR 评分服务
    - "src/vibe3/clients/git_client.py"          # Git 客户端
    - "src/vibe3/clients/github_client.py"       # GitHub 客户端

  # 公开 API：改动这些路径可能影响兼容性
  # 用于 risk assessment 的 public_api_touch 维度
  # 适用范围：整个项目的所有改动文件（不限于 src/vibe3）
  public_api_paths:
    # V2 (Shell) - 公开接口
    - "bin/vibe"             # 主入口

    # V3 (Python) - 命令层（公开 API）
    - "src/vibe3/commands/"  # v3 命令层

# 质量标准
quality:
  test_coverage:
    services: 80             # Services 层 ≥ 80%
    clients: 70              # Clients 层 ≥ 70%
    commands: 60             # Commands 层 ≥ 60%

# PR 评分配置
pr_scoring:
  # Size thresholds (when to upgrade from small to medium to large)
  size_thresholds:
    changed_lines:
      small: 50        # <50 lines = small (0 points)
      medium: 200      # 50-200 lines = medium (1 point)
      large: 500       # 200-500 lines = large (1 point), >500 = xlarge (2 points)
    changed_files:
      small: 4         # 1-3 files = small (0 points)
      medium: 10       # 4-10 files = medium (1 point), >10 = large (1 point)
    impacted_modules:
      small: 2         # 1 module = small (0 points)
      medium: 5        # 2-4 modules = medium (1 point), >=5 = large (2 points)

  # Points for each dimension
  weights:
    changed_lines:
      small: 0
      medium: 1
      large: 2         # Lowered from 2 (pre-push shouldn't over-penalize normal features)
      xlarge: 3
    changed_files:
      small: 0
      medium: 1
      large: 2         # Lowered from 2 (10+ files is reasonable for feature work)
    impacted_modules:
      small: 0
      medium: 1
      large: 2

    # Context dimensions (only used for PR review, not pre-push)
    critical_path_touch: 2
    public_api_touch: 2
    cross_module_symbol_change: 2    # Not used in pre-push
    codex_major: 3                    # Not used in pre-push
    codex_critical: 5                 # Not used in pre-push

  # Risk level thresholds (for display/labeling purposes)
  # These determine the risk level label (LOW/MEDIUM/HIGH/CRITICAL)
  # Example: score=7 -> HIGH (because 6 <= 7 < 9)
  thresholds:
    medium: 3     # score >= 3 -> MEDIUM risk
    high: 6       # score >= 6 -> HIGH risk
    critical: 9   # score >= 9 -> CRITICAL risk

  # Merge gate configuration (for action/behavior)
  # Controls whether to block and require review
  merge_gate:
    # Block pre-push if score >= this value
    # Note: This is separate from risk level thresholds
    # Example: score=10 -> CRITICAL level, but NOT blocked (10 < 12)
    # Example: score=12 -> CRITICAL level, AND blocked (12 >= 12)
    block_on_score_at_or_above: 10  # Raised from 9 to reduce false positives

    # Always block if codex returns these verdicts
    block_on_verdict:
      - "BLOCK"

# Review 配置
# Review Configuration
# =====================
# Data sources:
# - Static: Read from config file at runtime
# - Runtime: Injected by code (e.g., changed_symbols from inspect)
#
# Configuration boundaries:
# - This file: Static policy/agent/output config
# - Runtime code: AST analysis (changed_symbols, symbol_dag)
# - Command line: Task guidance (--message option)
review:
  # Static: Path to review policy markdown file
  policy_file: ".agent/policies/review.md"

  # Static: Path to tools guide markdown file
  common_rules: ".agent/policies/common.md"

  # Static: Agent configuration for codeagent-wrapper
  agent_config:
    # Agent preset name (passed to codeagent-wrapper)
    # 允许与 backend/model 同时存在；如果同时配置，执行时 agent 优先。
    # 典型用途：保留 preset 作为实际执行入口，同时把 backend/model 写出来用于显式说明或记录。
    agent: "vibe-reviewer"

    # Backend/model direct mode.
    # - 只配置 backend/model，不配置 agent：走 backend 直连模式
    # - 同时配置 agent 和 backend/model：仍然允许，但执行时 agent 优先
    # - model 只有在 backend 已配置时才有意义
    backend: "claude"  # e.g., "claude", "opencode", "gemini"
    model: "claude-sonnet-4-5"  # e.g., "claude-sonnet-4-6", "gemini-3-flash-preview"
    timeout_seconds: 3600

  # Static: Output format requirements (VERDICT contract)
  output_format: |
    The first line must be exactly:
    VERDICT: PASS | MAJOR | BLOCK

    Each finding should follow this format:
    path/to/file.py:42 [MAJOR] concise issue description

    The final line must repeat the same `VERDICT:`:
    VERDICT: PASS | MAJOR | BLOCK

    Where:
    - PASS: No significant issues found
    - MAJOR: Issues found that should be addressed before merge
    - BLOCK: Critical issues that must be fixed before merge

  # Static: Default review task guidance
  # Can be overridden via CLI: vibe review pr 42 --message "Focus on security"
  review_task: |
    Review only changed code, focus on correctness, regression, and security.
    Use AST analysis to understand impact scope.
    Prioritize actionable findings with clear severity.
    Follow the repository review contract.
    You must directly output the review result in stdout.
    The first line must be exactly `VERDICT: PASS | MAJOR | BLOCK`.
    The final line must repeat the same `VERDICT:` line.
    Keep `VERDICT` and `audit_ref` separate: verdict is the conclusion, audit_ref is the detailed report.
    You must explicitly record your final conclusion with
    `uv run python src/vibe3/cli.py handoff verdict <PASS|MAJOR|BLOCK>`.
    You should write a canonical audit report under `docs/reports/` in the current worktree
    and register it with `uv run python src/vibe3/cli.py handoff audit <path-to-audit-md>`.
    Use a repository-relative path such as `docs/reports/issue-123-audit-report.md`.
    If you do not explicitly run `handoff audit`, the system may save a minimal fallback audit_ref
    from your reviewer output, but that is only a minimal safety net and not your primary path.
    Do not rely on manager to reconstruct your verdict unless you truly cannot produce a valid one.

    ### MANDATORY EXIT STEP — you MUST do this before exit():
    Run this command to change the issue state label:
    ```bash
    gh issue edit <ISSUE_NUMBER> --add-label "state/handoff" --remove-label "state/review"
    ```
    Replace `<ISSUE_NUMBER>` with the actual issue number (check your branch name, e.g. `task/issue-476-*` means issue #476).
    WARNING: If you skip this step, the no-op gate will BLOCK this issue and the pipeline will stall.

  retry_task: |
    This is a retry review round, not a fresh review pass.
    Reuse the existing session context when available.
    Read the current authoritative refs yourself before continuing:
    - `report_ref` for the latest implementation report
    - `audit_ref` if a previous audit already exists
    If manager has appended handoff notes or an indicate file, read them and follow the latest instructions.
    Keep scope focused on verifying whether the previously raised concerns are now resolved.
    You must still follow the same output format and final state transition contract as a normal review.

  # Static: Custom review prompt (optional prefix)
  # Added to beginning of review context if provided
  review_prompt: "/code-review"

# Plan command configuration
# Plan Configuration
# =====================
# Similar structure to review for consistency
plan:
  # Static: Path to plan policy markdown file
  policy_file: ".agent/policies/plan.md"

  # Static: Path to tools guide markdown file
  common_rules: ".agent/policies/common.md"

  # Static: Agent configuration for codeagent-wrapper
  agent_config:
    # Agent preset name (passed to codeagent-wrapper)
    # 允许与 backend/model 同时存在；如果同时配置，执行时 agent 优先。
    agent: "vibe-planner"

    # Backend/model direct mode.
    # - 只配置 backend/model，不配置 agent：走 backend 直连模式
    # - 同时配置 agent 和 backend/model：仍然允许，但执行时 agent 优先
    # - model 只有在 backend 已配置时才有意义
    backend: "codex"  # e.g., "claude", "opencode", "gemini"
    model: "gpt-5.4"  # e.g., "claude-sonnet-4-6", "gemini-3-flash-preview"
    timeout_seconds: 3600

  # Static: Output format requirements
  output_format: |
    The plan should follow this structure:

    ## Summary
    Brief description of the implementation approach.

    ## Changes
    - file/path/one.py: Description of changes
    - file/path/two.py: Description of changes

    ## Implementation Steps
    1. Step one with details
    2. Step two with details

    ## Risks & Considerations
    - Risk 1 and mitigation
    - Risk 2 and mitigation

  # Static: Default plan task guidance
  # Can be overridden via CLI: vibe3 plan --issue 42
  plan_task: |
    Analyze requirements and identify affected files using inspect tools.
    Design minimal changes with clear implementation steps.
    Document risks and breaking changes upfront.
    Follow the repository planning contract.
    The auto-saved planner artifact is only for shared handoff or audit and is not the authoritative `plan_ref`.
    You must write a canonical plan markdown file under `docs/plans/` in the current worktree.
    After writing that file, register it with `uv run python src/vibe3/cli.py handoff plan <path-to-plan-md>`.
    Use a repository-relative path such as `docs/plans/issue-123-implementation-plan.md`.

    ### MANDATORY EXIT STEP — you MUST do this before exit():
    Run this command to change the issue state label:
    ```bash
    gh issue edit <ISSUE_NUMBER> --add-label "state/handoff" --remove-label "state/claimed"
    ```
    Replace `<ISSUE_NUMBER>` with the actual issue number (check your branch name, e.g. `task/issue-476-*` means issue #476).
    WARNING: If you skip this step, the no-op gate will BLOCK this issue and the pipeline will stall.

  retry_task: |
    This is a retry planning round, not a fresh planning pass.
    Reuse the existing session context when available.
    Read the current authoritative refs yourself before continuing:
    - `plan_ref` for the previous plan
    If manager has appended handoff notes or an indicate file, read them and follow the latest instructions.
    Revise the plan in place based on the latest feedback and current repository state.
    You must still follow the same output format and final state transition contract as a normal planning round.

  # Static: Optional plain-text default task guidance.
  # Slash-prefixed external skill triggers are ignored by vibe3 plan.
  plan_prompt: ""

# Run command configuration
# Run Configuration
# =====================
# Similar structure to review for consistency
run:
  # Static: Path to run policy markdown file
  policy_file: ".agent/policies/run.md"

  # Static: Path to tools guide markdown file
  common_rules: ".agent/policies/common.md"

  # Static: Agent configuration for codeagent-wrapper
  agent_config:
    # Agent preset name (passed to codeagent-wrapper)
    # 允许与 backend/model 同时存在；如果同时配置，执行时 agent 优先。
    agent: "vibe-executor"

    # Backend/model direct mode.
    # - 只配置 backend/model，不配置 agent：走 backend 直连模式
    # - 同时配置 agent 和 backend/model：仍然允许，但执行时 agent 优先
    # - model 只有在 backend 已配置时才有意义
    backend: "opencode"  # e.g., "claude", "opencode", "gemini"
    model: "alibaba-coding-plan-cn/glm-5"  # e.g., "claude-sonnet-4-6", "gemini-3-flash-preview"
    timeout_seconds: 3600

  # Static: Output format requirements
  output_format: |
    The execution report should follow this structure:

    ## Summary
    Brief description of what was implemented.

    ## Changes Made
    - file/path/one.py: What was changed and why
    - file/path/two.py: What was changed and why

    ## Tests
    - test_one.py: What is being tested
    - test_two.py: What is being tested

    ## Verification
    - [ ] All tests pass
    - [ ] No type errors
    - [ ] No lint errors

  # Static: Common task contract — applies to ALL execution paths (code, commit, skill, etc.)
  run_task: |
    The auto-saved executor artifact is only for shared handoff or audit and is not the authoritative `report_ref`.
    You must write a canonical execution report under `docs/reports/` in the current worktree.
    After writing that file, register it with `uv run python src/vibe3/cli.py handoff report <path-to-report-md>`.
    Use a repository-relative path such as `docs/reports/issue-123-execution-report.md`.

    ### MANDATORY EXIT STEP — you MUST do this before exit():
    Run this command to change the issue state label:
    ```bash
    gh issue edit <ISSUE_NUMBER> --add-label "state/handoff" --remove-label "state/in-progress"
    ```
    Replace `<ISSUE_NUMBER>` with the actual issue number (check your branch name, e.g. `task/issue-476-*` means issue #476).
    WARNING: If you skip this step, the no-op gate will BLOCK this issue and the pipeline will stall.

  # Static: Code execution skill — injected ONLY for plan/flow_plan/lightweight modes
  # Not included in skill or commit paths to avoid instruction conflicts.
  coding_task: |
    Follow plan steps strictly, verify each step before proceeding.
    Write clean code with tests, run verification after changes.
    Document any deviations with reasons.
    Follow the repository execution contract.

  # Static: Retry execution task — injected for executor retry rounds
  retry_task: |
    Treat this run as a focused retry round, not a fresh implementation pass.
    Reuse the existing session context when available.
    Read the current authoritative refs yourself before continuing:
    - `plan_ref` for the current plan
    - `report_ref` for the latest execution report
    - `audit_ref` for the latest review findings
    If manager has appended handoff notes or an indicate file, read them and follow the latest instructions.
    Read the audit feedback carefully and fix the cited problems first.
    Keep scope tight: do not expand the change unless required to resolve the reported issues safely.
    Explain any audit item you intentionally do not change, with a concrete reason.
    Re-run the most relevant verification for the reported failures before exit.
    Follow the repository execution contract.


  # Static: Custom run prompt (optional prefix)
  run_prompt: "/executing-plan"

# Orchestra Configuration
# =======================
# Webhook daemon for orchestration integrations
orchestra:
  # Enable webhook server itself (must be true if you want reviewer webhook handling)
  enabled: true

  # Polling interval in seconds (effective only when polling.enabled=true)
  polling_interval: 900

  # Debug mode heartbeat interval (used by `serve --debug` when no explicit --interval is given)
  debug_polling_interval: 60

  # Base ref for auto task scenes in normal mode
  scene_base_ref: "origin/main"

  # Polling fallback (for missed webhook events)
  polling:
    enabled: true

  # GitHub repository (optional). null 表示默认使用当前工作目录对应仓库
  repo: null

  # HTTP port for webhook receiver
  port: 8080

  # Webhook secret (set to same value as GitHub webhook secret)
  webhook_secret: "vibe-coding-control-center"

  # Maximum concurrent flows
  max_concurrent_flows: 3

  # Manager usernames used as reviewer/assignee match target
  manager_usernames:
    - "vibe-manager-agent"

  # Proactive manager dispatch via issues/assigned
  assignee_dispatch:
    enabled: true
    # manager 默认在独立临时 worktree 中执行（codeagent-wrapper --worktree）
    use_worktree: true
    # manager 支持两种写法：
    # - 配置 agent：走 preset 模式，preset 从 config/models.json 解析
    # - 只配置 backend/model：走 backend 直连模式
    # 如果同时配置 agent 和 backend/model，manager 执行时 agent 优先。
    agent: "vibe-manager"
    # backend/model 仅在以下场景生效：
    # - 未配置 agent，显式走 backend 直连模式
    # - 同时配置 agent 时，agent 仍是主入口；但 manager resolver 会先把 agent
    #   preset 解析成 backend/model，所以额外填写 model 仍可能影响最终模型
    #   选择，backend/model 不只是注释字段。
    backend:
    model:
    # manager 角色材料真源，由 prompt 组装时内联
    supervisor_file: "supervisor/manager.md"
    include_supervisor_content: true

  # PR reviewer-triggered review execution
  pr_review_dispatch:
    enabled: true
    async_mode: true
    # reviewer 默认复用 PR 对应已有 worktree；如需强制新 worktree 可开启
    use_worktree: false

  # State label-driven dispatch
  state_label_dispatch:
    enabled: true

  # @mention auto-ack in issue comments
  comment_reply:
    enabled: false

  # Governance prompt composition
  governance:
    enabled: true
    interval_ticks: 4
    # Supervisor file source: supervisor/<name>.md
    supervisor_file: "supervisor/governance/assignee-pool.md"
    supervisor_files:
      - "supervisor/governance/assignee-pool.md"
      - "supervisor/governance/roadmap-intake.md"
      - "supervisor/governance/cron-supervisor.md"
    # Template selector: config/prompts.yaml under this dotted key
    prompt_template: "orchestra.governance.plan"
    # Whether to inline the supervisor file into the composed governance prompt
    include_supervisor_content: true
    dry_run: false
    # Governance agent configuration (independent from run/manager)
    # 允许 agent 模式和 backend 模式并存；如果同时配置，agent 优先。
    agent: "vibe-governance"  # Maps in config/models.json
    # backend/model 支持两种用途：
    # - 只写 backend/model：直连 backend
    # - 同时写 agent 和 model：governance resolver 会先解析 preset，再允许 model
    #   覆盖最终模型；但执行入口仍以 agent 优先
    backend:
    model:

  supervisor_handoff:
    enabled: true
    issue_label: "supervisor"
    handoff_state_label: "state/handoff"
    supervisor_file: "supervisor/apply.md"
    prompt_template: "orchestra.supervisor.apply"
    # Supervisor handoff agent configuration (independent from run/manager/governance)
    # 允许 agent 模式和 backend 模式并存；如果同时配置，agent 优先。
    agent: "vibe-supervisor"  # Maps in config/models.json
    # backend/model 支持两种用途：
    # - 只写 backend/model：直连 backend
    # - 同时写 agent 和 model：supervisor resolver 会先解析 preset，再允许 model
    #   覆盖最终模型；但执行入口仍以 agent 优先
    backend:
    model:
