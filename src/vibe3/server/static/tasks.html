<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Status</title>
<style>
  :root {
    --bg:        #0f1117;
    --bg-stat:   #0f1117;
    --bg-hover:  #161d2e;
    --border:    #1e293b;
    --text:      #e2e8f0;
    --text-dim:  #64748b;
    --text-mute: #334155;
    --logo:      #f8fafc;
    --link:      #60a5fa;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg:        #f8fafc;
      --bg-stat:   #ffffff;
      --bg-hover:  #f1f5f9;
      --border:    #e2e8f0;
      --text:      #0f172a;
      --text-dim:  #64748b;
      --text-mute: #94a3b8;
      --logo:      #0f172a;
      --link:      #2563eb;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .logo { font-size: 18px; font-weight: 700; color: var(--logo); letter-spacing: -0.5px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 6px #22c55e; flex-shrink: 0; }
  .status-dot.offline { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
  .status-text { font-size: 13px; color: var(--text-dim); }
  .refresh-info { margin-left: auto; font-size: 12px; color: var(--text-mute); }

  .stats { display: flex; gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
  .stat { flex: 1; padding: 12px 20px; background: var(--bg-stat); text-align: center; }
  .stat-val { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

  .section { padding: 16px 24px 0; }
  .section-title { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 16px; }
  th { text-align: left; padding: 6px 10px; font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
  td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:hover td { background: var(--bg-hover); }

  .rank { color: var(--text-mute); font-size: 12px; width: 32px; }
  .issue-num { font-family: monospace; color: var(--link); font-size: 12px; white-space: nowrap; }
  .issue-num a { color: inherit; text-decoration: none; }
  .issue-num a:hover { text-decoration: underline; }
  .issue-title { color: var(--text); max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 11px; font-weight: 600; white-space: nowrap; }

  .state-in-progress { background: #1e3a5f; color: #60a5fa; }
  .state-claimed     { background: #2d1f4e; color: #a78bfa; }
  .state-ready       { background: #1c3028; color: #4ade80; }
  .state-blocked     { background: #3b1414; color: #f87171; }
  .state-review      { background: #2d2a10; color: #fbbf24; }
  .state-handoff     { background: #2d1f4e; color: #a78bfa; }
  .state-merge-ready { background: #1c3028; color: #4ade80; }
  .state-other       { background: #1e293b; color: #94a3b8; }

  @media (prefers-color-scheme: light) {
    .state-in-progress { background: #dbeafe; color: #1d4ed8; }
    .state-claimed     { background: #ede9fe; color: #6d28d9; }
    .state-ready       { background: #dcfce7; color: #15803d; }
    .state-blocked     { background: #fee2e2; color: #b91c1c; }
    .state-review      { background: #fef9c3; color: #a16207; }
    .state-handoff     { background: #ede9fe; color: #6d28d9; }
    .state-merge-ready { background: #dcfce7; color: #15803d; }
    .state-other       { background: #f1f5f9; color: #64748b; }
  }

  .verdict-pass  { background: #1c3028; color: #4ade80; }
  .verdict-major { background: #3b1414; color: #f87171; }
  .verdict-minor { background: #2d2a10; color: #fbbf24; }

  @media (prefers-color-scheme: light) {
    .verdict-pass  { background: #dcfce7; color: #15803d; }
    .verdict-major { background: #fee2e2; color: #b91c1c; }
    .verdict-minor { background: #fef9c3; color: #a16207; }
  }

  .road-p0 { background: #7f1d1d; color: #fca5a5; }
  .road-p1 { background: #1c2f4e; color: #93c5fd; }
  .road-p2 { background: #1e293b; color: #64748b; }

  @media (prefers-color-scheme: light) {
    .road-p0 { background: #fee2e2; color: #b91c1c; }
    .road-p1 { background: #dbeafe; color: #1d4ed8; }
    .road-p2 { background: #f1f5f9; color: #64748b; }
  }

  .ref-link { font-size: 11px; color: var(--text-dim); font-family: monospace; }
  .empty { color: var(--text-mute); font-size: 13px; padding: 20px 0; text-align: center; }

  .footer { padding: 12px 24px; color: var(--text-dim); font-size: 11px; border-top: 1px solid var(--border); margin-top: 8px; }
</style>
</head>
<body>

<header>
  <div class="status-dot" id="status-dot"></div>
  <div class="logo">Task Status</div>
  <div class="status-text" id="status-text">Loading...</div>
  <div class="refresh-info" id="refresh-info"></div>
</header>

<div class="stats">
  <div class="stat"><div class="stat-val" id="s-flows">-</div><div class="stat-label">Active Flows</div></div>
  <div class="stat"><div class="stat-val" id="s-wt">-</div><div class="stat-label">Worktrees</div></div>
  <div class="stat"><div class="stat-val" id="s-queued">-</div><div class="stat-label">Queued</div></div>
  <div class="stat"><div class="stat-val" id="s-total">-</div><div class="stat-label">Total Issues</div></div>
</div>

<div id="main-content"></div>

<div class="footer" id="footer"></div>

<script>
const BASE_URL = 'https://github.com/jacobcy/vibe-coding-control-center';
let refreshInterval = 30;
let countdown = refreshInterval;

function escapeHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function stateBadge(state) {
  const s = (state || '').toLowerCase().replace('state/', '').replace('-', '_');
  const cls = ['in_progress','claimed','ready','blocked','review','handoff','merge_ready'].includes(s) ? `state-${s}` : 'state-other';
  return `<span class="badge ${cls}">${escapeHtml(state || 'unknown')}</span>`;
}

function roadBadge(r) {
  if (!r) return '';
  const cls = r === 'p0' ? 'road-p0' : r === 'p1' ? 'road-p1' : 'road-p2';
  return `<span class="badge ${cls}">${escapeHtml(r)}</span>`;
}

function verdictBadge(v) {
  if (!v) return '';
  const val = (v.verdict || '').toLowerCase();
  const cls = val === 'pass' ? 'verdict-pass' : val === 'major' ? 'verdict-major' : 'verdict-minor';
  return `<span class="badge ${cls}">${escapeHtml(v.verdict || 'N/A')}</span>`;
}

function renderIssues(issues, title) {
  if (!issues || issues.length === 0) return '';

  let html = `<div class="section"><div class="section-title">${escapeHtml(title)} (${issues.length})</div>
  <table><thead><tr>
    <th>#</th><th>Issue</th><th>Title</th><th>State</th>
    <th>Road</th><th>Assignee</th><th>Verdict</th>
  </tr></thead><tbody>`;

  issues.forEach(e => {
    const issueNum = e.number;
    const issueCell = issueNum
      ? `<a href="${BASE_URL}/issues/${issueNum}" target="_blank">#${issueNum}</a>`
      : '-';
    const refs = [e.plan_ref, e.report_ref, e.audit_ref].filter(Boolean).map(r =>
      `<a class="ref-link" href="${BASE_URL}/blob/main/${escapeHtml(r)}" target="_blank">${escapeHtml(r.split('/').pop())}</a>`
    ).join(' ');

    html += `<tr>
      <td class="rank">${e.queue_rank || '-'}</td>
      <td class="issue-num">${issueCell}</td>
      <td class="issue-title" title="${escapeHtml(e.title)}">${escapeHtml(e.title)}</td>
      <td>${stateBadge(e.state)}</td>
      <td>${roadBadge(e.roadmap)}</td>
      <td style="color:var(--text-dim);font-size:12px">${escapeHtml(e.assignee || '-')}</td>
      <td>${verdictBadge(e.verdict)}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  return html;
}

async function load() {
  try {
    const r = await fetch('/api/tasks');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();

    // Header
    const dot = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    if (d.server_status.running) {
      dot.classList.remove('offline');
      text.textContent = `Server running · port ${d.server_status.port}`;
    } else {
      dot.classList.add('offline');
      text.textContent = 'Server not running';
    }

    // Stats
    document.getElementById('s-flows').textContent = d.server_status.active_flows || 0;
    document.getElementById('s-wt').textContent = d.server_status.active_worktrees || 0;
    document.getElementById('s-queued').textContent = d.server_status.queued_issues.length;
    document.getElementById('s-total').textContent = d.server_status.active_issues.length;

    // Render bucketed items
    const buckets = d.classified_issues.bucketed_items || {};
    let html = '';

    // Assignee Intake
    if (buckets['assignee-intake'] && buckets['assignee-intake'].length > 0) {
      html += renderIssues(buckets['assignee-intake'], 'Assignee Intake');
    }

    // Ready Queue
    if (buckets['ready-queue'] && buckets['ready-queue'].length > 0) {
      html += renderIssues(buckets['ready-queue'], 'Ready Queue');
    }

    // Ready Anomaly
    if (buckets['ready-anomaly'] && buckets['ready-anomaly'].length > 0) {
      html += renderIssues(buckets['ready-anomaly'], 'Ready Anomaly');
    }

    // Active Anomaly
    if (buckets['active-anomaly'] && buckets['active-anomaly'].length > 0) {
      html += renderIssues(buckets['active-anomaly'], 'Active Anomaly');
    }

    // Other
    if (buckets['other'] && buckets['other'].length > 0) {
      html += renderIssues(buckets['other'], 'Other');
    }

    // Blocked items
    if (d.classified_issues.blocked_items && d.classified_issues.blocked_items.length > 0) {
      html += renderIssues(d.classified_issues.blocked_items, 'Blocked');
    }

    // Remote items
    if (d.classified_issues.remote_items && d.classified_issues.remote_items.length > 0) {
      html += renderIssues(d.classified_issues.remote_items, 'Remote');
    }

    // Waiting for pool
    if (d.classified_issues.waiting_for_pool_items && d.classified_issues.waiting_for_pool_items.length > 0) {
      html += renderIssues(d.classified_issues.waiting_for_pool_items, 'Waiting for Pool');
    }

    // Supervisor items
    if (d.classified_issues.supervisor_items && d.classified_issues.supervisor_items.length > 0) {
      html += renderIssues(d.classified_issues.supervisor_items, 'Supervisor');
    }

    // RFC items
    if (d.classified_issues.roadmap_rfc_items && d.classified_issues.roadmap_rfc_items.length > 0) {
      html += renderIssues(d.classified_issues.roadmap_rfc_items, 'Roadmap RFC');
    }

    // Epic items
    if (d.classified_issues.roadmap_epic_items && d.classified_issues.roadmap_epic_items.length > 0) {
      html += renderIssues(d.classified_issues.roadmap_epic_items, 'Roadmap Epic');
    }

    if (!html) {
      html = '<div class="section"><div class="empty">No active tasks</div></div>';
    }

    document.getElementById('main-content').innerHTML = html;

    // Footer
    document.getElementById('footer').textContent =
      `interval ${d.server_status.polling_interval}s · ${d.flows.length} total flows`;

    // Sync refresh interval
    const pi = d.server_status.polling_interval;
    if (pi && pi !== refreshInterval) {
      refreshInterval = pi;
      countdown = pi;
    }

  } catch(e) {
    document.getElementById('status-dot').classList.add('offline');
    document.getElementById('status-text').textContent = 'Error loading';
    document.getElementById('main-content').innerHTML =
      `<div class="section"><div class="empty">Failed to load task status: ${e.message}</div></div>`;
  }
}

load();
setInterval(() => {
  countdown--;
  document.getElementById('refresh-info').textContent = `refresh in ${countdown}s`;
  if (countdown <= 0) { countdown = refreshInterval; load(); }
}, 1000);
</script>
</body>
</html>
