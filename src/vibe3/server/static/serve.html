<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orchestra Serve Status</title>
<style>
  :root {
    --bg:        #0f1117;
    --bg-stat:   #0f1117;
    --bg-hover:  #161d2e;
    --border:    #1e293b;
    --text:      #e2e8f0;
    --text-dim:  #64748b;
    --text-mute: #334155;
    --logo:      #f8fafc;
    --link:      #60a5fa;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg:        #f8fafc;
      --bg-stat:   #ffffff;
      --bg-hover:  #f1f5f9;
      --border:    #e2e8f0;
      --text:      #0f172a;
      --text-dim:  #64748b;
      --text-mute: #94a3b8;
      --logo:      #0f172a;
      --link:      #2563eb;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .banner { padding: 12px 24px; font-size: 13px; font-weight: 600; display: none; }
  .banner.active { display: block; background: #7f1d1d; color: #fca5a5; border-bottom: 1px solid #991b1b; }

  header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .logo { font-size: 18px; font-weight: 700; color: var(--logo); letter-spacing: -0.5px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 6px #22c55e; flex-shrink: 0; }
  .status-dot.offline { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
  .status-text { font-size: 13px; color: var(--text-dim); }
  .refresh-info { margin-left: auto; font-size: 12px; color: var(--text-mute); }

  .section { padding: 16px 24px 0; }
  .section-title { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 16px; }
  th { text-align: left; padding: 6px 10px; font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
  td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:hover td { background: var(--bg-hover); }

  .badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .badge-critical { background: #7f1d1d; color: #fca5a5; }
  .badge-error { background: #3b1414; color: #f87171; }
  .badge-warning { background: #2d2a10; color: #fbbf24; }
  .badge-running { background: #1c3028; color: #4ade80; }
  .badge-completed { background: #1e3a5f; color: #60a5fa; }
  .badge-failed { background: #3b1414; color: #f87171; }

  @media (prefers-color-scheme: light) {
    .badge-critical { background: #fee2e2; color: #b91c1c; }
    .badge-error { background: #fee2e2; color: #b91c1c; }
    .badge-warning { background: #fef9c3; color: #a16207; }
    .badge-running { background: #dcfce7; color: #15803d; }
    .badge-completed { background: #dbeafe; color: #1d4ed8; }
    .badge-failed { background: #fee2e2; color: #b91c1c; }
  }

  .info-row { display: flex; gap: 8px; padding: 4px 0; }
  .info-label { color: var(--text-dim); min-width: 140px; }
  .info-value { color: var(--text); }

  .activity-item { padding: 4px 0; color: var(--text-dim); font-size: 12px; }
</style>
</head>
<body>

<div id="failed-gate-banner" class="banner"></div>

<header>
  <div class="status-dot" id="status-dot"></div>
  <div class="logo">Orchestra Serve</div>
  <div class="status-text" id="status-text">Loading...</div>
  <div class="refresh-info" id="refresh-info"></div>
</header>

<div id="daemon-section" class="section">
  <div class="section-title">Daemon Status</div>
  <div id="daemon-info"></div>
</div>

<div id="heartbeat-section" class="section">
  <div class="section-title">Heartbeat</div>
  <div id="heartbeat-info"></div>
</div>

<div id="activity-section" class="section" style="display:none;">
  <div class="section-title">Dispatch Activity</div>
  <div id="activity-info"></div>
</div>

<div id="jobs-section" class="section" style="display:none;">
  <div class="section-title">Jobs</div>
  <table id="jobs-table">
    <thead><tr><th>Actor</th><th>Type</th><th>Status</th><th>Issue</th><th>Branch</th><th>PID</th></tr></thead>
    <tbody id="jobs-tbody"></tbody>
  </table>
  <div id="jobs-summary" style="padding:8px 0; font-size:12px; color:var(--text-dim);"></div>
</div>

<div id="errors-section" class="section" style="display:none;">
  <div class="section-title">Error Tracking</div>
  <div id="errors-summary" style="padding:8px 0; font-size:13px;"></div>
  <table id="errors-table">
    <thead><tr><th>Tick</th><th>Issue</th><th>Severity</th><th>Code</th><th>Time</th><th>Message</th></tr></thead>
    <tbody id="errors-tbody"></tbody>
  </table>
</div>

<script>
let refreshInterval = 30000;
let refreshTimer = null;

async function fetchData() {
  try {
    const resp = await fetch('/api/serve');
    const data = await resp.json();
    render(data);
    scheduleRefresh(data.heartbeat.polling_interval);
  } catch (err) {
    console.error('Failed to fetch serve status:', err);
    document.getElementById('status-text').textContent = 'Failed to load';
    document.getElementById('status-dot').classList.add('offline');
  }
}

function scheduleRefresh(interval) {
  if (interval && interval > 0) {
    refreshInterval = interval * 1000;
  }
  if (refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(fetchData, refreshInterval);
  document.getElementById('refresh-info').textContent = `Refresh: ${Math.round(refreshInterval/1000)}s`;
}

function render(data) {
  const {daemon, heartbeat, dispatch_activity, failed_gate, error_tracking, jobs} = data;

  // Status dot
  const dot = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  if (daemon.is_valid) {
    dot.classList.remove('offline');
    text.textContent = `Running (PID: ${daemon.pid})`;
  } else if (daemon.tmux_exists) {
    dot.classList.remove('offline');
    text.textContent = daemon.pid ? `Running (PID: ${daemon.pid} in tmux)` : 'Running in tmux';
  } else {
    dot.classList.add('offline');
    text.textContent = 'Stopped';
  }

  // FailedGate banner
  const banner = document.getElementById('failed-gate-banner');
  if (failed_gate.is_active) {
    banner.classList.add('active');
    banner.innerHTML = `<strong>FailedGate ACTIVE</strong> — Reason: ${escapeHtml(failed_gate.reason) || 'Unknown'} — Blocked ticks: ${failed_gate.blocked_ticks}<br><span style="font-size:12px;opacity:0.8;">To resume: vibe3 serve resume --reason "&lt;reason&gt;"</span>`;
  } else {
    banner.classList.remove('active');
  }

  // Daemon info
  document.getElementById('daemon-info').innerHTML = `
    <div class="info-row"><span class="info-label">PID:</span><span class="info-value">${daemon.pid || 'N/A'}</span></div>
    <div class="info-row"><span class="info-label">Tmux session:</span><span class="info-value">${daemon.tmux_exists ? 'Active' : 'None'}</span></div>
    <div class="info-row"><span class="info-label">Port:</span><span class="info-value">${daemon.port}</span></div>
    <div class="info-row"><span class="info-label">Log path:</span><span class="info-value">${daemon.log_path}</span></div>
  `;

  // Heartbeat info
  document.getElementById('heartbeat-info').innerHTML = `
    <div class="info-row"><span class="info-label">Tick count:</span><span class="info-value">${heartbeat.tick_count || 0}</span></div>
    <div class="info-row"><span class="info-label">Last tick:</span><span class="info-value">${heartbeat.last_tick_time || 'N/A'}</span></div>
    <div class="info-row"><span class="info-label">Polling interval:</span><span class="info-value">${heartbeat.polling_interval}s</span></div>
  `;

  // Dispatch activity
  const actSection = document.getElementById('activity-section');
  if (dispatch_activity && dispatch_activity.length > 0) {
    actSection.style.display = 'block';
    document.getElementById('activity-info').innerHTML = dispatch_activity.map(a => `<div class="activity-item">• ${escapeHtml(a)}</div>`).join('');
  } else {
    actSection.style.display = 'none';
  }

  // Jobs
  const jobsSection = document.getElementById('jobs-section');
  const allJobs = [...jobs.active, ...jobs.recent];
  if (allJobs.length > 0) {
    jobsSection.style.display = 'block';
    const tbody = document.getElementById('jobs-tbody');
    tbody.innerHTML = allJobs.map(j => `
      <tr>
        <td><code>${escapeHtml(j.actor_id || '-')}</code></td>
        <td>${escapeHtml(j.job_type || '-')}</td>
        <td><span class="badge badge-${j.status.toLowerCase()}">${escapeHtml(j.status)}</span></td>
        <td>${j.issue_number ? `#${j.issue_number}` : '-'}</td>
        <td><code>${escapeHtml(j.branch || '-')}</code></td>
        <td>${j.pid || '-'}</td>
      </tr>
    `).join('');
    document.getElementById('jobs-summary').innerHTML =
      `<span class="badge badge-running">Running: ${jobs.summary.running}</span> ` +
      `<span class="badge badge-completed">Completed: ${jobs.summary.completed}</span> ` +
      `<span class="badge badge-failed">Failed: ${jobs.summary.failed}</span>`;
  } else {
    jobsSection.style.display = 'none';
  }

  // Errors
  const errorsSection = document.getElementById('errors-section');
  if (error_tracking.total_errors > 0) {
    errorsSection.style.display = 'block';
    document.getElementById('errors-summary').innerHTML =
      `Total: ${error_tracking.total_errors} ` +
      `<span class="badge badge-critical">CRITICAL: ${error_tracking.critical_count}</span> ` +
      `<span class="badge badge-error">ERROR: ${error_tracking.error_count}</span> ` +
      `<span class="badge badge-warning">WARNING: ${error_tracking.warning_count}</span>`;

    if (error_tracking.recent_errors && error_tracking.recent_errors.length > 0) {
      const tbody = document.getElementById('errors-tbody');
      tbody.innerHTML = error_tracking.recent_errors.map(e => `
        <tr>
          <td>${e.tick_id || '-'}</td>
          <td>${e.issue_number ? `#${e.issue_number}` : 'governance'}</td>
          <td><span class="badge badge-${(e.severity||'error').toLowerCase()}">${escapeHtml(e.severity || 'ERROR')}</span></td>
          <td><code>${escapeHtml(e.error_code || '-')}</code></td>
          <td>${escapeHtml(e.created_at || '-')}</td>
          <td>${escapeHtml(e.error_message || '-')}</td>
        </tr>
      `).join('');
    }
  } else {
    errorsSection.style.display = 'none';
  }
}

function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

fetchData();
</script>
</body>
</html>
