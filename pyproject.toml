[project]
name = "vibe3"
version = "3.0.0"
requires-python = ">=3.10"
dependencies = [
    "typer>=0.9.0",
    "rich>=13.0.0",
    "pydantic>=2.0.0",
    "loguru>=0.7.0",
    "pyyaml>=6.0.3",
]

[project.scripts]
vibe3 = "vibe3.cli:main"

[dependency-groups]
dev = [
    "mypy>=1.5.0",
    "pytest>=7.4.0",
    "pytest-cov>=7.0.0",
    "ruff>=0.1.0",
    "black>=23.0.0",
    "pre-commit>=3.0.0",
    "types-pyyaml>=6.0.12.20250915",
]
