[project]
name = "vibe3"
version = "3.0.0"
requires-python = ">=3.11,<3.12"
dependencies = [
    "typer>=0.9.0",
    "rich>=13.0.0",
    "pydantic>=2.0.0",
    "loguru>=0.7.0",
    "pyyaml>=6.0.3",
    "serena-agent @ git+https://github.com/oraios/serena@v0.1.4",
]

[project.scripts]
vibe3 = "vibe3.cli:main"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

# This project uses uv for dependency management
# Run `uv sync` to install dependencies
# Run `uv run pytest` to run tests
# Run `uv run mypy` to run type checking

[tool.black]
line-length = 88
target-version = ['py310', 'py311', 'py312']

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.ruff.lint.isort]
known-first-party = ["vibe3"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
disallow_untyped_defs = true

[dependency-groups]
dev = [
    "mypy>=1.5.0",
    "pytest>=7.4.0",
    "pytest-cov>=7.0.0",
    "ruff>=0.1.0",
    "black>=23.0.0",
    "pre-commit>=3.0.0",
    "types-pyyaml>=6.0.12.20250915",
    "hypothesis>=6.151.9",
]
