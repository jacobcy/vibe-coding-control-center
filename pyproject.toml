[project]
name = "vibe3"
version = "3.0.0"
requires-python = ">=3.10"
dependencies = [
    "typer>=0.9.0",
    "rich>=13.0.0",
    "pydantic>=2.0.0",
    "loguru>=0.7.0",
]

[project.scripts]
vibe3 = "vibe3.cli:main"

[project.optional-dependencies]
dev = [
    "mypy>=1.5.0",
    "pytest>=7.4.0",
    "ruff>=0.1.0",
    "black>=23.0.0",
    "pre-commit>=3.0.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

# This project uses uv for dependency management
# Run `uv sync` to install dependencies
# Run `uv run pytest` to run tests
# Run `uv run mypy` to run type checking

[tool.black]
line-length = 88
target-version = ['py310']

[tool.ruff]
line-length = 88
select = ["E", "F", "I", "N", "W"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
disallow_untyped_defs = true

[dependency-groups]
dev = [
    "types-pyyaml>=6.0.12.20250915",
]
