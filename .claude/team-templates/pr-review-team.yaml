# PR Review Team Template
# 用于 vibe-team-review skill 加载团队配置
# 详细执行流程以 SKILL.md 为准

name: pr-review-team
description: 多 agent 协作的审查团队

# 执行模式配置
execution_mode:
  default: ask-each
  modes:
    auto-fix:
      description: 自动修复审核发现的问题并提交
    comment-only:
      description: 只发布审核意见，不修改代码
    auto-decide:
      description: team-lead 根据 PR 复杂度自动决定
    ask-each:
      description: 每次审核完毕后询问用户

# 环境要求
requirements:
  tmux: required
  team_mode: required

# 握手复用策略
# 复用判断 = 握手结果。不做 isActive 检查，不读 config.json state。
agent_reuse_via_handshake:
  rule: "复用判断 = 握手结果。"
  procedure: |
    1. 检查 Team 是否存在
    2. 对已有 members 逐个握手：SendMessage(to=member, lead_ready)
       - 收到 agent_ready → 复用
       - 超时 3 次（各 30s）→ 不可复用
    3. 全不可复用 → TeamDelete → TeamCreate 重建

# Agent 定义
agents:
  context-researcher:
    agent_definition: .claude/agents/pr-context-researcher.md
    subagent_type: pr-context-researcher
    model: haiku
    description: 背景调研员
    spawn_config:
      tools: [Read, Grep, Glob, WebFetch, Bash, SendMessage, ToolSearch]

  code-analyst:
    agent_definition: .claude/agents/pr-code-analyst.md
    subagent_type: pr-code-analyst
    model: sonnet
    description: 代码分析员
    spawn_config:
      tools: [Read, Grep, Glob, Bash, SendMessage, ToolSearch]

  architect-reviewer:
    agent_definition: .claude/agents/pr-architect-reviewer.md
    subagent_type: pr-architect-reviewer
    model: opus
    description: 架构审查专家
    spawn_config:
      tools: [Read, Grep, Glob, WebSearch, Bash, SendMessage, ToolSearch]

  security-reviewer:
    agent_definition: .claude/agents/pr-security-reviewer.md
    subagent_type: pr-security-reviewer
    model: sonnet
    description: 安全审查专家
    spawn_config:
      tools: [Read, Grep, Glob, Bash, SendMessage, ToolSearch]

  fix-executor:
    agent_definition: .claude/agents/pr-fix-executor.md
    subagent_type: pr-fix-executor
    model: sonnet
    description: 代码修复执行者
    spawn_config:
      tools: [Read, Edit, Write, Bash, Grep, Glob, SendMessage, ToolSearch]

# 审查质量要求
review_quality_requirements:
  forbidden:
    - "百分制 / 字母评分"
    - "援引与本 PR 无关的指标"
    - "安全/架构论证滑动到本 PR 未触碰的相邻代码"
    - "称'违规'但不引用具体规则来源"
    - "把测试数量等同于覆盖质量"
  required:
    - "每条违规必须引用规则来源（CLAUDE.md / coding-standards.md 等）"
    - "数字/行数声明必须基于本 PR 实际 diff"
    - "区分本 PR 改动 vs 既有代码"
