schema_version: "1.0"
extension:
  id: "vibe-spec-bridge"
  name: "Vibe Spec-Handoff Bridge"
  version: "0.1.0"
  description: >-
    Publishes spec-kit workflow artifacts (spec/plan/report/audit) into the
    Vibe flow through public `vibe3 handoff` commands. Project-owned and
    non-destructive to external spec-kit/superspec sources.
  author: "Vibe Center"
  license: "MIT"
requires:
  speckit_version: ">=0.1.0"
provides:
  commands:
    - name: "speckit.vibe-spec-bridge.publish-spec"
      file: "commands/publish-spec.md"
      description: "Publish the generated spec.md to the Vibe flow (after specify)"
    - name: "speckit.vibe-spec-bridge.publish-plan"
      file: "commands/publish-plan.md"
      description: "Publish the generated plan.md to the Vibe flow (after plan)"
    - name: "speckit.vibe-spec-bridge.publish-report"
      file: "commands/publish-report.md"
      description: "Publish the implementation report to the Vibe flow (after implement)"
    - name: "speckit.vibe-spec-bridge.publish-audit"
      file: "commands/publish-audit.md"
      description: "Publish the review audit to the Vibe flow (after review)"
hooks:
  after_specify:
    command: "speckit.vibe-spec-bridge.publish-spec"
    optional: false
    prompt: "Publish the generated spec into the Vibe flow?"
    description: "Record the canonical spec.md as spec_ref via `vibe3 handoff spec`"
  after_plan:
    command: "speckit.vibe-spec-bridge.publish-plan"
    optional: false
    prompt: "Publish the generated plan into the Vibe flow?"
    description: "Record plan.md as plan_ref via `vibe3 handoff plan`"
  after_implement:
    command: "speckit.vibe-spec-bridge.publish-report"
    optional: true
    prompt: "Publish the implementation report into the Vibe flow?"
    description: "Record the report as report_ref via `vibe3 handoff report`"
  after_review:
    command: "speckit.vibe-spec-bridge.publish-audit"
    optional: true
    prompt: "Publish the review audit into the Vibe flow?"
    description: "Record the audit as audit_ref via `vibe3 handoff audit`"
tags: ["spec-kit", "handoff", "bridge", "vibe"]
