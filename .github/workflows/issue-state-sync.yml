name: Issue State Sync

on:
  pull_request:
    types: [closed]

jobs:
  sync-done:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Set linked issues to done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Parse issue numbers from PR body using GitHub closing keywords
          PR_BODY="${{ github.event.pull_request.body }}"
          ISSUE_NUMBERS=$(echo "$PR_BODY" | grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?) #[0-9]+' | grep -oE '[0-9]+' | sort -u)
          
          for ISSUE_NUM in $ISSUE_NUMBERS; do
            echo "Processing issue #$ISSUE_NUM"
            
            # Get current labels
            CURRENT_LABELS=$(gh issue view "$ISSUE_NUM" --json labels --jq '.labels[].name' 2>/dev/null || echo "")
            
            # Remove existing state/* labels
            for LABEL in $CURRENT_LABELS; do
              if [[ "$LABEL" == state/* ]]; then
                echo "Removing label: $LABEL"
                gh issue edit "$ISSUE_NUM" --remove-label "$LABEL" || true
              fi
            done
            
            # Add state/done label
            echo "Adding label: state/done"
            gh issue edit "$ISSUE_NUM" --add-label "state/done" || true
          done