name: Issue State Sync

on:
  pull_request:
    types: [closed]

jobs:
  sync-done:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Set linked issues to done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run python - <<'PY'
          import json
          import os
          import re
          import sys

          sys.path.insert(0, "src")

          from vibe3.models import IssueState
          from vibe3.services import LabelService

          # Read PR body from GitHub event JSON (safe from shell interpolation)
          event_path = os.environ.get("GITHUB_EVENT_PATH")
          if not event_path or not os.path.exists(event_path):
              print("No GitHub event file found")
              sys.exit(0)

          with open(event_path, "r") as f:
              event = json.load(f)

          pr_body = event.get("pull_request", {}).get("body", "")
          if not pr_body:
              print("No PR body found")
              sys.exit(0)

          # Parse issue numbers using closing keywords pattern
          pattern = r"(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?) #(\d+)"
          issues = sorted(set(int(m.group(1)) for m in re.finditer(pattern, pr_body, re.IGNORECASE)))

          if not issues:
              print("No linked issues detected.")
              sys.exit(0)

          service = LabelService()
          for issue_number in issues:
              result = service.confirm_issue_state(
                  issue_number,
                  IssueState.DONE,
                  actor="github-action:issue-state-sync",
                  force=True,
              )
              print(f"issue #{issue_number}: {result}")
          PY
