name: Issue State Sync

on:
  pull_request:
    types: [closed]

jobs:
  sync-done:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Set linked issues to done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Parse issue numbers from PR body using GitHub closing keywords
          PR_BODY="${{ github.event.pull_request.body }}"
          ISSUE_NUMBERS=$(echo "$PR_BODY" | grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?) #[0-9]+' | grep -oE '[0-9]+' | sort -u)

          if [[ -z "$ISSUE_NUMBERS" ]]; then
            echo "No linked issues detected."
            exit 0
          fi

          export ISSUE_NUMBERS
          uv run python - <<'PY'
          import os
          import sys

          sys.path.insert(0, "src")

          from vibe3.models.orchestration import IssueState
          from vibe3.services.label_service import LabelService

          raw = os.environ.get("ISSUE_NUMBERS", "").strip()
          issues = [int(x) for x in raw.split() if x.isdigit()]

          service = LabelService()
          for issue_number in issues:
              result = service.confirm_issue_state(
                  issue_number,
                  IssueState.DONE,
                  actor="github-action:issue-state-sync",
                  force=True,
              )
              print(f"issue #{issue_number}: {result}")
          PY
