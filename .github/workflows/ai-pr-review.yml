name: AI PR Review

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      review_type:
        description: 'Review type to trigger'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - codex
          - copilot
          - skip

jobs:
  # 根据 PR 标签或手动输入决定审查策略
  determine-strategy:
    runs-on: ubuntu-latest
    outputs:
      review_type: ${{ steps.strategy.outputs.review_type }}
    steps:
      - id: strategy
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          MANUAL_REVIEW_TYPE: ${{ github.event.inputs.review_type }}
        run: |
          # Manual dispatch takes priority
          if [ -n "$MANUAL_REVIEW_TYPE" ] && [ "$MANUAL_REVIEW_TYPE" != "auto" ]; then
            echo "review_type=$MANUAL_REVIEW_TYPE" >> $GITHUB_OUTPUT
            echo "🎯 Manual trigger: $MANUAL_REVIEW_TYPE review"
            exit 0
          fi

          echo "标签: $LABELS"

          # 根据标签决定审查策略
          if echo "$LABELS" | grep -q 'type/feature\|type/feat'; then
            if echo "$LABELS" | grep -q 'scope/infrastructure\|component/cli\|component/flow\|component/pr\|component/task\|component/client\|component/config'; then
              echo "review_type=codex" >> $GITHUB_OUTPUT
              echo "🤖 高影响新功能，使用 Codex 审查"
            else
              echo "review_type=manual" >> $GITHUB_OUTPUT
              echo "✋ 普通新功能，默认不自动触发在线审查"
            fi
          elif echo "$LABELS" | grep -q 'type/fix'; then
            if echo "$LABELS" | grep -q 'scope/infrastructure\|component/cli\|component/flow\|component/pr\|component/task\|component/client\|component/config'; then
              echo "review_type=copilot" >> $GITHUB_OUTPUT
              echo "🛠️ 高影响修复，使用 Copilot 审查"
            else
              echo "review_type=manual" >> $GITHUB_OUTPUT
              echo "✋ 普通修复，默认不自动触发在线审查"
            fi
          elif echo "$LABELS" | grep -q 'type/refactor'; then
            echo "review_type=skip" >> $GITHUB_OUTPUT
            echo "🔄 重构，已在本地完成测试和验证"
          elif echo "$LABELS" | grep -q 'type/docs\|type/test\|type/chore'; then
            echo "review_type=manual" >> $GITHUB_OUTPUT
            echo "📋 文档/测试/杂项变更，需要手动审查"
          else
            echo "review_type=manual" >> $GITHUB_OUTPUT
            echo "❓ 未知类型，需要手动审查"
          fi

  # Codex bot 审查 (用于 feat)
  codex-review:
    needs: determine-strategy
    if: |
      needs.determine-strategy.outputs.review_type == 'codex' && (
        github.event.label.name == 'trigger/ai-review' ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - name: Check if review already requested
        id: check-review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENTS=$(gh pr view ${{ github.event.pull_request.number }} --comments --json comments --jq '.comments[].body')
          if echo "$COMMENTS" | grep -q "@codex review"; then
            echo "already_reviewed=true" >> $GITHUB_OUTPUT
            echo "⚠️ Codex review already requested (found @codex review comment), skipping"
          else
            echo "already_reviewed=false" >> $GITHUB_OUTPUT
            echo "✅ No previous Codex review found, will request"
          fi

      - name: Request Codex Review
        if: steps.check-review.outputs.already_reviewed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const readyLabel = 'trigger/ai-review';
            const labels = context.payload.pull_request.labels.map(l => l.name);

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '@codex review'
            });

            const nextLabels = labels.filter(label => label !== readyLabel);
            await github.rest.issues.setLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: nextLabels,
            });

      - name: Remove trigger label if skipped
        if: steps.check-review.outputs.already_reviewed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const readyLabel = 'trigger/ai-review';
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const nextLabels = labels.filter(label => label !== readyLabel);
            await github.rest.issues.setLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: nextLabels,
            });

  # Copilot 代码审查 (用于 fix)
  copilot-review:
    needs: determine-strategy
    if: |
      needs.determine-strategy.outputs.review_type == 'copilot' && (
        github.event.label.name == 'trigger/ai-review' ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - name: Check if review already requested
        id: check-review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REVIEWS=$(gh pr view ${{ github.event.pull_request.number }} --json reviews --jq '.reviews[] | select(.user.login == "copilot")')
          if [ -n "$REVIEWS" ]; then
            echo "already_reviewed=true" >> $GITHUB_OUTPUT
            echo "⚠️ Copilot review already requested, skipping"
          else
            echo "already_reviewed=false" >> $GITHUB_OUTPUT
            echo "✅ No previous Copilot review found, will request"
          fi

      - name: Request Copilot Review
        if: steps.check-review.outputs.already_reviewed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const readyLabel = 'trigger/ai-review';
            const labels = context.payload.pull_request.labels.map(l => l.name);

            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              reviewers: ['copilot']
            });

            const nextLabels = labels.filter(label => label !== readyLabel);
            await github.rest.issues.setLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: nextLabels,
            });

      - name: Remove trigger label if skipped
        if: steps.check-review.outputs.already_reviewed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const readyLabel = 'trigger/ai-review';
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const nextLabels = labels.filter(label => label !== readyLabel);
            await github.rest.issues.setLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: nextLabels,
            });

  # 手动审查提醒 (用于 docs/test/chore)
  manual-review:
    needs: determine-strategy
    if: |
      needs.determine-strategy.outputs.review_type == 'manual' && (
        github.event.label.name == 'trigger/ai-review' ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Add manual review comment
        uses: actions/github-script@v7
        with:
          script: |
            const readyLabel = 'trigger/ai-review';
            const labels = context.payload.pull_request.labels.map(l => l.name);
            let changeType = '未知类型';

            if (labels.includes('type/docs')) changeType = '文档';
            else if (labels.includes('type/test')) changeType = '测试';
            else if (labels.includes('type/chore')) changeType = '杂项';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📋 **此 PR 标记为 ${changeType} 变更**\n\n请手动决定是否需要测试：\n- 如果需要测试，请手动触发 CI 工作流\n- 如果不需要测试，请直接进行人工审查\n\n感谢您的贡献！ 🎉`
            });

            // Remove trigger label
            const nextLabels = labels.filter(label => label !== readyLabel);
            await github.rest.issues.setLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: nextLabels,
            });
