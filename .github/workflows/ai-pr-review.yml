name: AI PR Review

on:
  pull_request:
    types: [labeled]

jobs:
  # 根据 PR 标签决定审查策略
  determine-strategy:
    runs-on: ubuntu-latest
    outputs:
      review_type: ${{ steps.strategy.outputs.review_type }}
    steps:
      - id: strategy
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          echo "标签: $LABELS"

          # 根据标签决定审查策略
          if echo "$LABELS" | grep -q 'type/feat'; then
            echo "review_type=codex" >> $GITHUB_OUTPUT
            echo "🤖 新功能，使用 Codex 审查"
          elif echo "$LABELS" | grep -q 'type/fix'; then
            echo "review_type=copilot" >> $GITHUB_OUTPUT
            echo "🛠️ Bug 修复，使用 Copilot 审查"
          elif echo "$LABELS" | grep -q 'type/refactor'; then
            echo "review_type=skip" >> $GITHUB_OUTPUT
            echo "🔄 重构，已在本地完成测试和验证"
          elif echo "$LABELS" | grep -q 'type/docs\|type/test\|type/chore'; then
            echo "review_type=manual" >> $GITHUB_OUTPUT
            echo "📋 文档/测试/杂项变更，需要手动审查"
          else
            echo "review_type=manual" >> $GITHUB_OUTPUT
            echo "❓ 未知类型，需要手动审查"
          fi

  # Codex bot 审查 (用于 feat)
  codex-review:
    needs: determine-strategy
    if: needs.determine-strategy.outputs.review_type == 'codex' && github.event.label.name == 'status/ready-for-review'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Request Codex Review
        # 在评论区 @codex 触发外部 bot
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '@codex review'
            });

      - name: Remove ready-for-review label
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --remove-label "status/ready-for-review"

  # Copilot 代码审查 (用于 fix)
  copilot-review:
    needs: determine-strategy
    if: needs.determine-strategy.outputs.review_type == 'copilot' && github.event.label.name == 'status/ready-for-review'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Request Copilot Review
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              reviewers: ['copilot']
            });

      - name: Remove ready-for-review label
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --remove-label "status/ready-for-review"

  # 手动审查提醒 (用于 docs/test/chore)
  manual-review:
    needs: determine-strategy
    if: needs.determine-strategy.outputs.review_type == 'manual' && github.event.label.name == 'status/ready-for-review'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Add manual review comment
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            let changeType = '未知类型';

            if (labels.includes('type/docs')) changeType = '文档';
            else if (labels.includes('type/test')) changeType = '测试';
            else if (labels.includes('type/chore')) changeType = '杂项';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📋 **此 PR 标记为 ${changeType} 变更**\n\n请手动决定是否需要测试：\n- 如果需要测试，请手动触发 CI 工作流\n- 如果不需要测试，请直接进行人工审查\n\n感谢您的贡献！ 🎉`
            });

      - name: Remove ready-for-review label
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --remove-label "status/ready-for-review"