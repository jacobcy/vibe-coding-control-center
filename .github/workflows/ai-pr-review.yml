name: AI PR Review

on:
  pull_request:
    types: [labeled]

jobs:
  review:
    runs-on: ubuntu-latest
    # 只在打上 ready-for-review 标签时触发
    if: ${{ github.event.label.name == 'status/ready-for-review' }}
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整历史用于 base 对比

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run review and publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
        run: |
          uv run python src/vibe3/cli.py review pr ${{ github.event.pull_request.number }} --publish

      - name: Remove ready-for-review label
        # review 完成后移除标签，避免重复触发
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --remove-label "status/ready-for-review"
