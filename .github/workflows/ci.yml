name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats shellcheck zsh

      # Setup Python environment for v3
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Check Python LOC ceiling
        run: bash scripts/hooks/check-python-loc.sh
        env:
          ENFORCE_LOC_LIMITS: true

      - name: Check Shell LOC ceiling
        run: bash scripts/hooks/check-shell-loc.sh
        env:
          ENFORCE_LOC_LIMITS: true

      - name: Check per-file LOC ceiling (production code)
        run: bash scripts/hooks/check-per-file-loc.sh
        env:
          ENFORCE_LOC_LIMITS: true

      - name: Check per-file LOC ceiling (test code, layer-aware)
        run: bash scripts/hooks/check-test-file-loc.sh
        env:
          ENFORCE_LOC_LIMITS: true

      # Shell checks
      - name: Run dual-layer lint
        run: bash scripts/hooks/lint.sh

      - name: Run bats tests
        run: bats tests/vibe2/

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --dev

      # Python checks for v3
      - name: Run Python lint (ruff)
        run: uv run ruff check src

      - name: Run Python format check (black)
        run: uv run black --check src tests/vibe3

      - name: Run Python type check (mypy)
        run: uv run mypy src

      - name: Run Python tests (pytest)
        run: uv run pytest tests/vibe3 -v
