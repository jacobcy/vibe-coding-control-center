name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Install zsh
        run: sudo apt-get install -y zsh

      # Setup Python environment for v3
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.10

      - name: Install Python dependencies
        run: |
          uv sync --dev
          # Verify dev dependencies are installed
          uv pip list | grep -E "(ruff|black|mypy|pytest)" || echo "Dev dependencies check"

      # Shell checks
      - name: Run dual-layer lint
        run: bash scripts/lint.sh

      - name: Run bats tests
        run: bats tests/

      # Python checks for v3
      - name: Run Python lint (ruff)
        run: |
          uv pip install ruff
          uv run ruff check scripts/python/vibe3

      - name: Run Python format check (black)
        run: uv run black --check scripts/python/vibe3 tests/vibe3

      - name: Run Python type check (mypy)
        run: uv run mypy scripts/python/vibe3

      - name: Run Python tests (pytest)
        run: uv run pytest tests/vibe3 -v

      # LOC checks for all code
      - name: Check Shell LOC ceiling (lib/ + bin/ + lib3/ ≤ 7000)
        run: |
          total=$(find lib/ bin/ lib3/ -name '*.sh' -o -name 'vibe' 2>/dev/null | xargs cat 2>/dev/null | wc -l)
          echo "Total Shell LOC: $total"
          if [ "$total" -gt 7000 ]; then
            echo "FAIL: Total Shell LOC $total exceeds 7000 limit"
            exit 1
          fi
          echo "✅ Total Shell LOC: $total / 7000"

      - name: Check per-file ceiling for Shell (≤ 300 lines each)
        run: |
          failed=0
          for f in lib/*.sh lib3/*.sh bin/vibe; do
            [ -f "$f" ] || continue
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 300 ]; then
              echo "FAIL: $f has $lines lines (limit: 300)"
              failed=$((failed + 1))
            else
              echo "  ✅ $f: $lines lines"
            fi
          done
          if [ "$failed" -gt 0 ]; then
            echo "FAIL: $failed files exceed the 300-line limit"
            exit 1
          fi
          echo "✅ All Shell files within 300-line limit"

      - name: Check Python LOC ceiling (scripts/python ≤ 3000)
        run: |
          total=$(find scripts/python -name '*.py' | xargs cat | wc -l)
          echo "Total Python LOC: $total"
          if [ "$total" -gt 3000 ]; then
            echo "FAIL: Total Python LOC $total exceeds 3000 limit"
            exit 1
          fi
          echo "✅ Total Python LOC: $total / 3000"

      - name: Check per-file ceiling for Python (≤ 300 lines each)
        run: |
          failed=0
          for f in $(find scripts/python/vibe3 -name '*.py'); do
            [ -f "$f" ] || continue
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 300 ]; then
              echo "FAIL: $f has $lines lines (limit: 300)"
              failed=$((failed + 1))
            else
              echo "  ✅ $f: $lines lines"
            fi
          done
          if [ "$failed" -gt 0 ]; then
            echo "FAIL: $failed files exceed the 300-line limit"
            exit 1
          fi
          echo "✅ All Python files within 300-line limit"
