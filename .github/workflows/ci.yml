name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats shellcheck zsh

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Check Python LOC ceiling
        run: bash scripts/hooks/check-python-loc.sh
        env:
          ENFORCE_LOC_LIMITS: true

      - name: Check Shell LOC ceiling
        run: bash scripts/hooks/check-shell-loc.sh
        env:
          ENFORCE_LOC_LIMITS: true

      - name: Check per-file LOC ceiling (production code)
        run: bash scripts/hooks/check-per-file-loc.sh
        env:
          ENFORCE_LOC_LIMITS: true

      - name: Check per-file LOC ceiling (test code, layer-aware)
        run: bash scripts/hooks/check-test-file-loc.sh
        env:
          ENFORCE_LOC_LIMITS: true

      - name: Run dual-layer lint
        run: bash scripts/hooks/lint.sh

      - name: Run bats tests
        run: bats tests/vibe2/

      - name: Run Python lint (ruff)
        run: uv run ruff check src

      - name: Run Python format check (black)
        run: uv run black --check src tests/vibe3

      - name: Run Python type check (mypy)
        run: uv run mypy src

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: uv run pytest tests/vibe3 -v -m "not integration and not slow" --ignore=tests/vibe3/test_modularity --ignore=tests/vibe3/integration

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Run integration tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: uv run pytest tests/vibe3/integration -v --ignore=tests/vibe3/test_modularity

  test-modularity:
    name: Modularity Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Run modularity tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: uv run pytest tests/vibe3/test_modularity -v
