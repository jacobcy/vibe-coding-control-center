name: Smart Code Review

on:
  pull_request:
    types: [labeled, opened, synchronize]

jobs:
  # 根据 PR 标签决定审查策略
  determine-strategy:
    runs-on: ubuntu-latest
    outputs:
      review_type: ${{ steps.strategy.outputs.review_type }}
    steps:
      - id: strategy
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          echo "标签: $LABELS"

          # 根据标签决定审查策略
          if echo "$LABELS" | grep -q 'type/docs'; then
            echo "review_type=manual" >> $GITHUB_OUTPUT
            echo "📋 文档变更，需要手动审查"
          elif echo "$LABELS" | grep -q 'type/test'; then
            echo "review_type=manual" >> $GITHUB_OUTPUT
            echo "🧪 测试变更，需要手动审查"
          elif echo "$LABELS" | grep -q 'type/chore'; then
            echo "review_type=manual" >> $GITHUB_OUTPUT
            echo "🔧 杂项变更，需要手动审查"
          elif echo "$LABELS" | grep -q 'type/feat'; then
            echo "review_type=codex" >> $GITHUB_OUTPUT
            echo "🤖 新功能，使用 Codex 审查"
          elif echo "$LABELS" | grep -q 'type/fix'; then
            echo "review_type=copilot" >> $GITHUB_OUTPUT
            echo "🛠️ Bug 修复，使用 Copilot 审查"
          elif echo "$LABELS" | grep -q 'type/refactor'; then
            echo "review_type=local" >> $GITHUB_OUTPUT
            echo "🔄 重构，运行本地测试"
          else
            echo "review_type=manual" >> $GITHUB_OUTPUT
            echo "❓ 未知类型，需要手动审查"
          fi

  # Codex 代码审查 (用于 feat)
  codex-review:
    needs: determine-strategy
    if: needs.determine-strategy.outputs.review_type == 'codex'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Request Codex Review
        # 通过 GitHub 评论触发 @codex review
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '@codex review'
            });

  # Copilot 代码审查 (用于 fix)
  copilot-review:
    needs: determine-strategy
    if: needs.determine-strategy.outputs.review_type == 'copilot'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Request Copilot Review
        # 使用 GitHub API 请求 Copilot 审查
        # 参考: https://docs.github.com/en/rest/pulls/review-requests
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              reviewers: ['copilot']  // GitHub Copilot 的 reviewer 名称
            });

  # 本地测试 (用于 refactor)
  local-test:
    needs: determine-strategy
    if: needs.determine-strategy.outputs.review_type == 'local'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats shellcheck zsh

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Run Shell lint
        run: bash scripts/hooks/lint.sh

      - name: Run bats tests
        run: bats tests/vibe2/

      - name: Run Python lint (ruff)
        run: uv run ruff check src

      - name: Run Python format check (black)
        run: uv run black --check src tests/vibe3

      - name: Run Python type check (mypy)
        run: uv run mypy src

      - name: Run Python tests (pytest)
        run: uv run pytest tests/vibe3 -v

  # 手动审查提醒 (用于 docs/test/chore)
  manual-review:
    needs: determine-strategy
    if: needs.determine-strategy.outputs.review_type == 'manual'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Add manual review comment
        uses: actions/github-script@v7
        with:
          script: |
            const labelMap = {
              'type/docs': '文档',
              'type/test': '测试',
              'type/chore': '杂项'
            };

            const labels = context.payload.pull_request.labels.map(l => l.name);
            const matchedLabel = labels.find(l => labelMap[l]) || '未知类型';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📋 **此 PR 标记为 ${matchedLabel} 变更**\n\n请手动决定是否需要测试：\n- 如果需要测试，请手动触发 CI 工作流\n- 如果不需要测试，请直接进行人工审查\n\n感谢您的贡献！ 🎉`
            });