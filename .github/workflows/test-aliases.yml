name: Test Aliases

on:
  push:
    branches: [main]
    paths:
      - "config/shell/*.sh"
      - "lib/alias/*.sh"
      - "tests/test-aliases.sh"
  pull_request:
    branches: [main]
    paths:
      - "config/shell/*.sh"
      - "lib/alias/*.sh"
      - "tests/test-aliases.sh"

jobs:
  test-aliases:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install zsh (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Check zsh version
        run: zsh --version

      - name: Run syntax check on all alias files
        shell: zsh {0}
        run: |
          cd $GITHUB_WORKSPACE
          echo "Checking syntax of all alias and config files..."
          setopt NULL_GLOB
          for file in config/shell/*.sh lib/alias/*.sh; do
            echo "Checking: $file"
            zsh -n "$file"
          done
          echo "✓ All syntax checks passed"
