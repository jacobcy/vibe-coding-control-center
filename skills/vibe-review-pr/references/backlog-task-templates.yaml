# Backlog Task Templates for vibe-review-pr
# Extracted from SKILL.md Phase 0 Step 6
#
# This file contains all Phase 1-5 TaskCreate YAML configurations.
# Each phase template is self-contained with all required metadata fields.

---
# Phase 1: 背景调研
- tool: TaskCreate
  params:
    subject: "Phase 1: 背景调研"
    description: |
      【输入】PR 编号
      【输出】phase_1_output（结构化背景报告）
      【步骤】spawn context-researcher → 握手 → 分配任务 → 等待报告 → 保存 output
      【门禁】handshake_status.context-researcher == "ready"、phase_1_output 非空
    metadata:
      handshake_required: true
      handshake_protocol: "ordered_v1"
      handshake_agents: ["context-researcher"]
      handshake_status:
        context-researcher: "pending"
      task_activation_allowed: false
      expected_next_action: "send_context_lead_ready"
      activation_state: "awaiting_lead_ready"
      wakeup_policy:
        max_attempts: 3
        timeout: "30s"
      on_handshake_failure: "skip_phase_and_fallback_to_single_agent"
      phase_order: 1
      depends_on_phase: 0
      must_create_next_phase_backlog: true
      next_phase_task_id: "phase-2-task-id"
    owner: ""
    status: "pending"

---
# Phase 2: 专家评审
- tool: TaskCreate
  params:
    subject: "Phase 2: 专家评审"
    description: |
      【输入】phase_1_output
      【输出】code-analyst / architect-reviewer / security-reviewer 报告
      【步骤】spawn agents → 逐个握手 → 分配任务 → 等待报告 → 收集全部
      【门禁】至少 1 个 agent handshake_status == "ready" 且返回有效报告
    metadata:
      handshake_required: true
      handshake_agents: ["code-analyst", "architect-reviewer", "security-reviewer"]
      handshake_status:
        code-analyst: "pending"
        architect-reviewer: "pending"
        security-reviewer: "pending"
      task_activation_allowed: false
      expected_next_action: "send_code_analyst_lead_ready"
      activation_state: "awaiting_first_lead_ready"
      wakeup_policy:
        max_attempts: 3
        timeout: "30s"
      requires_phase_1_output: true
      on_handshake_failure: "skip_unready_agent_and_mark_review_incomplete"
      phase_order: 2
      depends_on_phase: 1
      must_create_next_phase_backlog: true
      next_phase_task_id: "phase-3-task-id"
    addBlockedBy: ["phase-1-task-id"]
    owner: ""
    status: "pending"

---
# Phase 3: Codex 复查
- tool: TaskCreate
  params:
    subject: "Phase 3: Codex 复查"
    description: |
      【输入】Phase 2 全部报告
      【输出】codex 验证报告或 skip 标记及原因
      【步骤】校验报告 → 判断触发条件 → 调用 codex（或跳过）
      【门禁】已做出"启用 codex"或"跳过 codex"明确决定
    metadata:
      requires_phase_2_reports: true
      codex_trigger_conditions: ["security_pr", "large_pr>500lines", "report_conflict"]
      phase_2_complete_required: true
      phase_order: 3
      depends_on_phase: 2
      must_create_next_phase_backlog: true
      next_phase_task_id: "phase-4-task-id"
    addBlockedBy: ["phase-2-task-id"]
    owner: ""
    status: "pending"

---
# Phase 4: 综合判断
- tool: TaskCreate
  params:
    subject: "Phase 4: 综合判断"
    description: |
      【输入】Phase 2 可用报告 + Phase 3 codex 报告
      【输出】最终决策（APPROVE/NEEDS_CHANGES/REJECT）+ 结构化审查报告
      【步骤】收集报告 → 冲突仲裁 → 最终决策 → 质量自查
      【门禁】最终决策已做出、通过 Review Quality Standards 全部 8 条自查
    metadata:
      requires_phase_2_and_3_output: true
      quality_standards_checklist: [8 items]
      phase_order: 4
      depends_on_phase: 3
      must_create_next_phase_backlog: true
      next_phase_task_id: "phase-5-task-id"
    addBlockedBy: ["phase-3-task-id"]
    owner: ""
    status: "pending"

---
# Phase 5: 写回 + 修复
- tool: TaskCreate
  params:
    subject: "Phase 5: 写回 + 修复"
    description: |
      【输入】Phase 4 最终决策和审查报告
      【输出】PR comment + follow-up issues + 可选修复 commit
      【步骤】判断执行模式 → 写 PR comment → 修复（如 auto-fix）→ 创建 follow-up
      【门禁】PR comment 已发布、follow-up issue 已创建或确认无需创建
    metadata:
      execution_mode: "ask-each"
      requires_phase_4_output: true
      phase_order: 5
      depends_on_phase: 4
      execution_mode_options:
        ask-each: "每次询问用户"
        auto-decide: "team-lead 根据复杂度自动决定"
        auto-fix: "自动修复"
        comment-only: "只写 comment"
    addBlockedBy: ["phase-4-task-id"]
    owner: ""
    status: "pending"