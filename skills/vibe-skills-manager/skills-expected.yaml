# Skills 期望配置
# 声明本项目期望安装的 skills，用于 Skill 分析差距

# 本项目使用的 Agents
agents:
  - claude-code
  - codex
  - opencode
  - agy

# 当前支持的第三方能力仓库。
# 确定 GitHub 仓库后，按 agent 选择对应 plugin 安装器。
repositories:
  claude-mem: https://github.com/thedotmack/claude-mem
  superpowers: https://github.com/obra/superpowers
  ponytail: https://github.com/DietrichGebert/ponytail
  caveman: https://github.com/JuliusBrussee/caveman
  speckit: https://github.com/github/spec-kit

# 全局期望 - 所有项目共享
global:
  # Claude Code 全局期望
  claude:
    expected:
      superpowers-plugin:
        description: Claude Code 官方 plugin 形态的 Superpowers 能力集
        install: claude plugin install superpowers@claude-plugins-official
      ponytail-plugin:
        description: Ponytail 极简工程纪律插件
        install: claude plugin marketplace add DietrichGebert/ponytail && claude plugin install ponytail@ponytail
      caveman-plugin:
        description: Caveman 输出压缩插件
        install: claude plugin marketplace add JuliusBrussee/caveman && claude plugin install caveman@caveman
      claude-mem-plugin:
        description: claude-mem 跨会话记忆插件
        install: claude plugin marketplace add thedotmack/claude-mem && claude plugin install claude-mem
      speckit:
        description: spec-kit / superspec 项目技能
        install: specify integration install claude --force && specify extension add superspec

  # Codex 全局期望
  codex:
    expected:
      superpowers-plugin:
        description: Codex plugin 形态的 Superpowers 能力集
        install: codex plugin marketplace add https://github.com/obra/superpowers.git && codex plugin add superpowers@superpowers-dev
      ponytail-plugin:
        description: Ponytail Codex plugin
        install: codex plugin marketplace add https://github.com/DietrichGebert/ponytail.git && codex plugin add ponytail@ponytail
      caveman-plugin:
        description: Caveman Codex plugin
        install: codex plugin marketplace add JuliusBrussee/caveman && codex plugin add caveman@caveman
      claude-mem-plugin:
        description: claude-mem Codex marketplace plugin
        install: codex plugin marketplace add thedotmack/claude-mem && codex plugin add claude-mem@claude-mem-local
      speckit:
        description: spec-kit / superspec Codex skills
        install: specify integration install codex --force && specify extension add superspec

  # OpenCode 全局期望
  opencode:
    expected:
      superpowers-plugin:
        description: OpenCode git-backed Superpowers plugin
        install: opencode plugin "superpowers@git+https://github.com/obra/superpowers.git" --global
      ponytail-plugin:
        description: OpenCode Ponytail plugin
        install: opencode plugin opencode-ponytail --global
      caveman-plugin:
        description: Caveman OpenCode installer
        install: npx -y github:JuliusBrussee/caveman -- --only opencode
      claude-mem:
        description: claude-mem OpenCode integration
        install: npx claude-mem install --ide opencode

  # Agy 全局期望
  agy:
    expected:
      ponytail-plugin:
        description: Ponytail Agy plugin
        install: agy plugin install https://github.com/DietrichGebert/ponytail
      superpowers-plugin:
        description: Superpowers Agy plugin
        install: agy plugin install https://github.com/obra/superpowers
      caveman-plugin:
        description: Caveman Agy plugin
        install: agy plugin install https://github.com/JuliusBrussee/caveman

# 项目级期望 - 当前项目专属
project:
  # Claude Code 项目级期望
  claude:
    expected:
      vibe-star:
        description: 本项目原生 vibe-* 系列 skills（vibe-check, vibe-commit 等 16 个）
        install: scripts/init.sh (自动 symlink 到 .claude/skills/)

  # 其他 Agents 项目级期望
  agents:
    expected:
      vibe-star:
        description: 本项目原生 vibe-* 系列 skills
        install: scripts/init.sh (自动 symlink 到 agent-specific skills dirs)

  # 独立扩展 - 自己管理的工具
  managed:
    openspec:
      description: OpenSpec 工具链，包含 openspec-new-change, openspec-apply-change 等 10+ 命令
      install: openspec init --tools claude,codex,opencode
      # OpenSpec 自己管理，不通过 npx skills 或 claude plugin

  # 用户可选增强
  optional:
    gstack:
      description: Gstack 系列增强能力，提供 QA、部署、浏览器自动化、设计评审等扩展技能
      install: git clone --single-branch --depth 1 https://github.com/garrytan/gstack.git ~/.claude/skills/gstack && cd ~/.claude/skills/gstack && ./setup
