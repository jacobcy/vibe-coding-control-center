# Skills 期望配置
# 声明本项目期望安装的 skills，用于 Skill 分析差距

# 本项目使用的 Agents
agents:
  - claude-code
  - codex
  - gemini
  - opencode
  - copilot

# 全局期望 - 所有项目共享
global:
  # Claude Code 全局期望
  claude:
    expected:
      superpowers-plugin:
        description: Claude Code 官方 plugin 形态的 Superpowers 能力集
        install: claude plugin install superpowers@claude-plugins-official
        # Claude Code 优先走官方 plugin 生态，不用 npx skills 模拟

  # 其他 Agents 全局期望
  agents:
    expected:
      superpowers:
        description: 开发方法论工具集，包含 brainstorming, systematic-debugging, writing-plans 等 14+ skills
        install: npx skills add obra/superpowers -g --agent antigravity codex kiro-cli -y
        # 其他 Agents (Antigravity, Codex, Kiro-cli) 主要使用 npx skills 分发的 Superpowers

# 项目级期望 - 当前项目专属
project:
  # Claude Code 项目级期望
  claude:
    expected:
      vibe-star:
        description: 本项目原生 vibe-* 系列 skills（vibe-check, vibe-commit 等 16 个）
        install: scripts/init.sh (自动 symlink 到 .claude/skills/)

  # 其他 Agents 项目级期望
  agents:
    expected:
      vibe-star:
        description: 本项目原生 vibe-* 系列 skills
        install: scripts/init.sh (自动 symlink 到 .agent/skills/)

  # 独立扩展 - 自己管理的工具
  managed:
    openspec:
      description: OpenSpec 工具链，包含 openspec-new-change, openspec-apply-change 等 10+ 命令
      install: openspec init --tools antigravity,claude,codex,trae
      # OpenSpec 自己管理，不通过 npx skills 或 claude plugin

  # 用户可选增强
  optional:
    gstack:
      description: Gstack 系列增强能力，提供 QA、部署、浏览器自动化、设计评审等扩展技能
      install: git clone --single-branch --depth 1 https://github.com/garrytan/gstack.git ~/.claude/skills/gstack && cd ~/.claude/skills/gstack && ./setup
